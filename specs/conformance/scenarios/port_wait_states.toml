id = "kernel.port.wait_states"
description = "Port wait returns BAD_HANDLE for invalid handle and SHOULD_WAIT for empty port"
tags = ["module:port", "kind:qemu"]
timeout_ms = 180000
command = [
  "sh",
  "-c",
  "cargo build -p axle-kernel -p nexus-test-runner --target x86_64-unknown-none && runner=target/x86_64-unknown-none/debug/nexus-test-runner && size=$(stat -c%s \"$runner\") && timeout 8s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x1000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x0fffff8 -kernel target/x86_64-unknown-none/debug/axle-kernel; code=$?; echo qemu_exit=$code; [ \"$code\" -eq 33 ]"
]
expect = ["kernel: int80 conformance ok"]
forbid = ["KERNEL PANIC"]
contracts = [
  "must.port.wait_bad_handle_returns_bad_handle",
  "must.port.wait_empty_returns_should_wait",
]

[assertions.error_code]
bad_wait = -11
empty_wait = -22
