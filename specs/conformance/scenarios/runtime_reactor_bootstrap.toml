id = "kernel.runtime.reactor_bootstrap"
description = "Bootstrap ring3 Rust userspace should drive a thin libzircon wrapper plus a single-thread dispatcher/executor over channel, socket, registration, and sleep paths"
tags = ["kernel", "runtime", "reactor", "dispatcher", "bootstrap"]

command = [
  "bash",
  "-c",
  "target_dir=target/conformance/reactor && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && AXLE_TEST_RUNNER_RUST_ENTRY=reactor_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && timeout --foreground 8s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x1000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x0fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; code=$?; echo qemu_exit=$code; [ \"$code\" -eq 33 ]"
]

contracts = [
  "must.runtime.libzircon_bootstrap",
  "must.runtime.reactor_bootstrap",
]

expect = ["kernel: userspace runtime dispatcher"]
forbid = ["KERNEL PANIC"]

[assertions.status_code]
rt_dispatcher_create = 0
rt_reg_create_first = 0
rt_reg_cancel_first = 0
rt_reg_create_second = 0
rt_channel_create = 0
rt_channel_seed_write = 0
rt_channel_recv = 0
rt_sleep_create = 0
rt_sleep_wait = 0
rt_channel_call_create = 0
rt_channel_call_server_spawn = 0
rt_channel_call_server_recv = 0
rt_channel_call_server_reply = 0
rt_channel_call = 0
rt_socket_create = 0
rt_socket_seed_write = 0
rt_socket_wait_readable = 0
rt_socket_read = 0
rt_close_seed_tx = 0
rt_close_seed_rx = 0
rt_close_call_client = 0
rt_close_call_server = 0
rt_close_socket_tx = 0
rt_close_socket_rx = 0

[assertions.packet_fields]
rt_failure_step = 0
rt_reg_slot_reused = 1
rt_reg_generation_advanced = 1
rt_channel_recv_actual_bytes = 5
rt_channel_recv_match = 1
rt_channel_call_server_match = 1
rt_channel_call_actual_bytes = 4
rt_channel_call_match = 1
rt_socket_read_actual_bytes = 4
rt_socket_read_match = 1
