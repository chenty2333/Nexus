id = "kernel.runtime.reactor_bootstrap"
description = "Bootstrap ring3 Rust userspace should drive a thin libzircon wrapper plus a single-thread dispatcher/executor over channel, socket, registration, and sleep paths"
tags = ["kernel", "runtime", "reactor", "dispatcher", "bootstrap"]

command = [
  "bash",
  "-c",
  "cargo build -p axle-kernel --target x86_64-unknown-none && AXLE_TEST_RUNNER_RUST_ENTRY=reactor_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none && runner=target/x86_64-unknown-none/debug/nexus-test-runner && size=$(stat -c%s \"$runner\") && timeout --foreground 8s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x1000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x0fffff8 -kernel target/x86_64-unknown-none/debug/axle-kernel; code=$?; echo qemu_exit=$code; [ \"$code\" -eq 33 ]"
]

contracts = [
  "must.runtime.libzircon_bootstrap",
  "must.runtime.reactor_bootstrap",
]

expect = ["kernel: userspace runtime dispatcher"]
forbid = ["KERNEL PANIC"]

[assertions.status_code]
dispatcher_create = 0
reg_create_first = 0
reg_cancel_first = 0
reg_create_second = 0
channel_create = 0
channel_seed_write = 0
channel_recv = 0
sleep_create = 0
sleep_wait = 0
channel_call_create = 0
channel_call_server_spawn = 0
channel_call_server_recv = 0
channel_call_server_reply = 0
channel_call = 0
socket_create = 0
socket_seed_write = 0
socket_wait_readable = 0
socket_read = 0
close_seed_tx = 0
close_seed_rx = 0
close_call_client = 0
close_call_server = 0
close_socket_tx = 0
close_socket_rx = 0

[assertions.packet_fields]
failure_step = 0
reg_slot_reused = 1
reg_generation_advanced = 1
channel_recv_actual_bytes = 5
channel_recv_match = 1
channel_call_server_match = 1
channel_call_actual_bytes = 4
channel_call_match = 1
socket_read_actual_bytes = 4
socket_read_match = 1
