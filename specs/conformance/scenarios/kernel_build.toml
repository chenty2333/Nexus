id = "kernel.pipeline.core_chain"
description = "Core end-to-end chain: syscall entry -> dispatch -> object impl -> return"
tags = [
  "module:kernel",
  "module:syscall",
  "module:port",
  "module:timer",
  "module:handle",
  "kind:qemu",
]
timeout_ms = 180000
command = [
  "sh",
  "-c",
  "target_dir=target/conformance/default-int80 && cargo build -p axle-kernel -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && timeout --foreground 8s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x1000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x0fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; code=$?; echo qemu_exit=$code; [ \"$code\" -eq 33 ]"
]
expect = ["kernel: int80 conformance ok"]
forbid = ["KERNEL PANIC"]
contracts = [
  "must.syscall.bad_syscall_returns_bad_syscall",
  "must.handle.close_double_returns_bad_handle",
  "must.port.wait_bad_handle_returns_bad_handle",
  "must.port.wait_empty_returns_should_wait",
  "must.port.queue_wait_roundtrip_ok",
  "must.timer.set_cancel_ok",
]

[assertions.status_code]
queue = 0
wait = 0
wait_one_future_ok = 0
timer_set = 0
timer_cancel = 0
timer_close = 0
close = 0

[assertions.error_code]
unknown = -13
close_invalid = -11
port_create_bad_opts = -10
port_create_null_out = -10
bad_wait = -11
port_wait_null_out = -10
empty_wait = -22
port_queue_null_pkt = -10
port_queue_bad_type = -10
timer_create_bad_opts = -10
timer_create_bad_clock = -10
timer_create_null_out = -10
port_wait_wrong_type = -12
port_queue_wrong_type = -12
timer_set_wrong_type = -12
timer_cancel_wrong_type = -12
timer_close_again = -11
close_again = -11
wait_one_future_timeout = -21

[assertions.signal_mask]
wait_one_future_timeout_observed = 0
wait_one_future_ok_observed = 8

[elf_check]
path = "target/conformance/default-int80/x86_64-unknown-none/debug/axle-kernel"
require_xen_pvh_note = true
