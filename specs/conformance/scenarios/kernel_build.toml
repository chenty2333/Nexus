id = "kernel.pipeline.core_chain"
description = "Core end-to-end chain: syscall entry -> dispatch -> object impl -> return"
tags = [
  "module:kernel",
  "module:syscall",
  "module:port",
  "module:timer",
  "module:handle",
  "kind:qemu",
]
timeout_ms = 180000
command = [
  "sh",
  "-lc",
  "cargo build -p axle-kernel --target x86_64-unknown-none && timeout 8s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -no-shutdown -kernel target/x86_64-unknown-none/debug/axle-kernel; code=$?; [ \"$code\" -eq 0 ] || [ \"$code\" -eq 124 ]"
]
expect = ["runner: int80 smoke ok"]
forbid = ["KERNEL PANIC"]
contracts = [
  "must.syscall.bad_syscall_returns_bad_syscall",
  "must.handle.close_double_returns_bad_handle",
  "must.port.wait_bad_handle_returns_bad_handle",
  "must.port.wait_empty_returns_should_wait",
  "must.port.queue_wait_roundtrip_ok",
  "must.timer.set_cancel_ok",
]

[assertions.status_code]
queue = 0
wait = 0
timer_set = 0
timer_cancel = 0
close = 0

[assertions.error_code]
unknown = -13
bad_wait = -11
empty_wait = -22
close_again = -11

[elf_check]
path = "target/x86_64-unknown-none/debug/axle-kernel"
require_xen_pvh_note = true
