id = "kernel.runtime.bootstrap_perf_smoke"
description = "Bootstrap ring3 perf smoke should export minimal syscall/scheduler/timer tracing plus null-syscall and wake-path microbench summaries"
tags = ["kernel", "runtime", "perf", "trace", "bootstrap"]
timeout_ms = 180000

command = [
  "bash",
  "-c",
  "target_dir=target/conformance/perf-smoke && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && AXLE_TEST_RUNNER_RUST_ENTRY=perf_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && { timeout --foreground 20s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x7000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x6fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; qemu_code=$?; echo qemu_exit=$qemu_code; [ \"$qemu_code\" -eq 33 ]; }"
]

expect = [
  "kernel: bootstrap perf smoke",
  "kernel: bootstrap trace summary",
]
forbid = ["KERNEL PANIC"]
contracts = []

[assertions.status_code]
perf_thread_create = 0
perf_thread_start = 0
perf_eventpair_create = 0
perf_null_status = 0
perf_wait_status = 0
perf_wake_status = 0
perf_tlb_status = 0
perf_tlb_peer_status = 0

[assertions.packet_fields]
perf_failure_step = 0
perf_null_iters = 64
perf_wait_iters = 32
perf_wake_iters = 32
perf_tlb_iters = 8
perf_tlb_peer_iters = 8
trace_tlb_max_active_cpus = 2
trace_sys_enter_phase1 = 64
trace_sys_exit_phase1 = 64
trace_sys_retire_phase1 = 64
trace_tlb_page_flush_phase4 = 40
trace_tlb_sync_plan_phase5 = 8
trace_tlb_shootdown_full_phase5 = 8
