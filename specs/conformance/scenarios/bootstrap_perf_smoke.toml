id = "kernel.runtime.bootstrap_perf_smoke"
description = "Bootstrap ring3 perf smoke should export minimal syscall/scheduler/timer/TLB/fault tracing plus null-syscall and wake-path microbench summaries"
tags = ["kernel", "runtime", "perf", "trace", "bootstrap"]
timeout_ms = 180000

command = [
  "bash",
  "-c",
  "target_dir=target/conformance/perf-smoke && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && AXLE_TEST_RUNNER_RUST_ENTRY=perf_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && { timeout --foreground 20s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x7000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x6fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; qemu_code=$?; echo qemu_exit=$qemu_code; [ \"$qemu_code\" -eq 33 ]; }"
]

expect = [
  "kernel: bootstrap perf smoke",
  "kernel: bootstrap trace summary",
]
forbid = ["KERNEL PANIC"]
contracts = []

[assertions.status_code]
perf_thread_create = 0
perf_thread_start = 0
perf_eventpair_create = 0
perf_null_status = 0
perf_wait_status = 0
perf_wake_status = 0
perf_tlb_status = 0
perf_tlb_peer_status = 0
perf_fault_status = 0
perf_channel_fragment_status = 0
perf_as_switch_status = 0

[assertions.packet_fields]
perf_failure_step = 0
perf_null_iters = 64
perf_wait_iters = 32
perf_wake_iters = 32
perf_tlb_iters = 8
perf_tlb_peer_iters = 8
perf_fault_iters = 1
perf_channel_fragment_iters = 8
perf_as_switch_iters = 32
trace_sched_phase3_ok = 1
trace_tlb_phase8_ok = 1
trace_sys_enter_phase1 = 64
trace_sys_exit_phase1 = 64
trace_sys_retire_phase1 = 64
trace_sys_native_enter_phase1 = 64
trace_sys_native_sysret_phase1 = 64
trace_tlb_sync_plan_phase5 = 8
trace_tlb_shootdown_full_phase5 = 0
trace_tlb_shootdown_page = 32
trace_fault_enter_phase6 = 3
trace_fault_handled_phase6 = 1
trace_fault_block_phase6 = 2
trace_fault_resume_phase6 = 2
trace_fault_unhandled_phase6 = 0
trace_ipc_channel_enqueue_phase7 = 8
trace_ipc_channel_dequeue_phase7 = 8
trace_ipc_channel_reclaim_phase7 = 8
channel_fragment_pool_new = 2
channel_fragment_pool_reuse = 14
channel_fragment_pool_local_free = 16
channel_fragment_pool_remote_free = 0
channel_fragment_pool_cached_current = 2
channel_fragment_pool_cached_peak = 2
channel_fragmented_desc_count = 8
channel_fragmented_bytes_total = 65536

[assertions.packet_fields_min]
trace_records = 5000
trace_export_bytes = 250000
trace_sched_handoff_phase3 = 60
trace_sched_remote_wake_latency_phase3 = 60
trace_tlb_page_flush_phase4 = 40

[assertions.packet_fields_max]
perf_null_cycles = 100000000
perf_wait_cycles = 800000000
perf_wake_cycles = 800000000
perf_tlb_cycles = 1000000000
perf_tlb_peer_cycles = 800000000
perf_fault_cycles = 200000000
perf_channel_fragment_cycles = 1500000000
perf_as_switch_cycles = 1200000000
trace_sched_remote_wake_latency_max_ns = 10000000
