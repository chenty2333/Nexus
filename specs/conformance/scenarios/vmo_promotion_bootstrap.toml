id = "kernel.vmo.promotion_bootstrap"
description = "Bootstrap ring3 Rust userspace should freeze anonymous VMO promotion from LocalPrivate to GlobalShared across cross-process handle transfer/install"
tags = ["kernel", "runtime", "vm", "vmo", "bootstrap", "process"]
timeout_ms = 180000

command = [
  "bash",
  "-c",
  "target_dir=target/conformance/vmo-promotion-smoke && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && AXLE_TEST_RUNNER_RUST_ENTRY=vmo_promotion_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && { timeout --foreground 20s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x7000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x6fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; qemu_code=$?; echo qemu_exit=$qemu_code; [ \"$qemu_code\" -eq 33 ]; }"
]

expect = [
  "kernel: vmo promotion smoke",
]
forbid = ["KERNEL PANIC"]
contracts = ["should.vmo.anonymous_promotion_bootstrap_contract"]

[assertions.status_code]
vmo_promotion_create = 0
vmo_promotion_info_before = 0
vmo_promotion_channel_create = 0
vmo_promotion_process_create = 0
vmo_promotion_thread_create = 0
vmo_promotion_prepare_start = 0
vmo_promotion_process_start = 0
vmo_promotion_handle_dup = 0
vmo_promotion_transfer = 0
vmo_promotion_wait_reply = 0
vmo_promotion_read_reply = 0
vmo_promotion_child_info = 0
vmo_promotion_parent_info_after = 0

[assertions.packet_fields]
vmo_promotion_present = 1
vmo_promotion_failure_step = 0
vmo_promotion_info_before_kind = 0
vmo_promotion_info_before_backing_scope = 0
vmo_promotion_child_info_kind = 0
vmo_promotion_child_info_backing_scope = 1
vmo_promotion_parent_info_after_kind = 0
vmo_promotion_parent_info_after_backing_scope = 1
