id = "kernel.job.bootstrap"
description = "Public jobs should own child jobs/processes, support job-scoped kill, and cache policy ceilings at future handle derivation"
tags = ["kernel", "job", "policy", "bootstrap", "qemu"]
timeout_ms = 180000

command = [
  "bash",
  "-c",
  "target_dir=target/conformance/job-smoke && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && AXLE_TEST_RUNNER_RUST_ENTRY=job_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && { timeout --foreground 20s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x7000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x6fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; qemu_code=$?; echo qemu_exit=$qemu_code; [ \"$qemu_code\" -eq 33 ]; }"
]

expect = ["kernel: job smoke"]
forbid = ["KERNEL PANIC"]
contracts = [
  "should.job.tree_bootstrap",
  "should.job.policy_ceiling_bootstrap",
]

[assertions.status_code]
root_job = 0
root_info = 0
child_job = 0
child_info_before = 0
child_process_create = 0
child_job_from_process = 0
child_info_after = 0
kill_job = 0
wait_killed_process = 0
policy_set = 0
eventpair_create = 0
policy_dup = 0
policy_wait_denied = -30

[assertions.packet_fields]
job_present = 1
job_failure_step = 0
root_child_jobs_before = 0
child_job_same = 1
child_process_count_after = 1
wait_killed_observed = 8

[assertions.packet_fields_min]
root_job_id = 1
child_job_id = 2
child_parent_koid = 1
