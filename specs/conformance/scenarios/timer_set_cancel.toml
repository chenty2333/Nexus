id = "kernel.timer.set_cancel"
description = "Timer set/cancel returns ZX_OK on valid timer handle"
tags = ["module:timer", "kind:qemu"]
timeout_ms = 180000
command = [
  "sh",
  "-lc",
  "cargo build -p axle-kernel --target x86_64-unknown-none && timeout 8s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -no-shutdown -kernel target/x86_64-unknown-none/debug/axle-kernel; code=$?; [ \"$code\" -eq 0 ] || [ \"$code\" -eq 124 ]"
]
expect = ["trap: int80 self-test ok"]
forbid = ["KERNEL PANIC"]
contracts = ["must.timer.set_cancel_ok"]

[assertions.status_code]
timer_set = 0
timer_cancel = 0
