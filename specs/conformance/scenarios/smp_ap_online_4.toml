id = "kernel.smp.ap_online_4"
description = "SMP bring-up: APs come online under -smp 4, one AP acks a fixed-vector IPI, and ring3 reaches one narrow breakpoint smoke"
tags = ["module:smp", "kind:qemu"]
timeout_ms = 180000
command = [
  "sh",
  "-c",
  "target_dir=target/conformance/smp-smoke && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && AXLE_TEST_RUNNER_RUST_ENTRY=smp_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && timeout --foreground 12s qemu-system-x86_64 -machine q35 -m 256M -smp 4 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x7000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x6fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; code=$?; echo qemu_exit=$code; [ \"$code\" -eq 33 ]",
]
expect = [
  "cpu1 online",
  "cpu2 online",
  "cpu3 online",
  "smp: requested cpu_count=4",
  "smp: ipi_ack=1",
  "kernel: smp smoke ok",
]
forbid = ["KERNEL PANIC"]
