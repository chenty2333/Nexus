id = "kernel.channel.close_read_order_bootstrap"
description = "Bootstrap channel close/read ordering keeps queued messages readable before PEER_CLOSED-only state"
tags = ["module:channel", "module:kernel", "kind:qemu"]
timeout_ms = 180000
command = [
  "sh",
  "-c",
  "cargo build -p axle-kernel -p nexus-test-runner --target x86_64-unknown-none && runner=target/x86_64-unknown-none/debug/nexus-test-runner && size=$(stat -c%s \"$runner\") && timeout --foreground 8s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x1000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x0fffff8 -kernel target/x86_64-unknown-none/debug/axle-kernel; code=$?; echo qemu_exit=$code; [ \"$code\" -eq 33 ]"
]
expect = ["kernel: int80 conformance ok"]
forbid = ["KERNEL PANIC"]
contracts = ["should.channel.close_read_order_bootstrap"]

[assertions.status_code]
channel_close_read_create = 0
channel_close_read_write = 0
channel_close_read_close = 0
channel_close_read_wait = 0
channel_close_read_status = 0
channel_close_drain_wait = 0

[assertions.error_code]
channel_close_drain_read = -24

[assertions.packet_fields]
channel_close_read_wait_observed = 5
channel_close_read_actual_bytes = 8
channel_close_read_match = 1
channel_close_drain_wait_observed = 4
