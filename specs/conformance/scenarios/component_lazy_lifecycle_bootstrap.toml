id = "kernel.component.lazy_lifecycle_bootstrap"
description = "Bootstrap ring3 Rust userspace should resolve children through capability lookup, lazy-start one provider on first `/svc` route, and drive minimal Stop/Kill controller lifecycle for eager workers launched from boot-backed ELF images"
tags = ["kernel", "component", "runner", "resolver", "lifecycle", "bootstrap"]
timeout_ms = 180000

command = [
  "bash",
  "-c",
  "target_dir=target/conformance/component-round3 && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && NEXUS_INIT_ROOT_URL=boot://root-round3 RUSTFLAGS='-C code-model=large -C debuginfo=0' cargo build -p nexus-init -p echo-provider -p echo-client -p controller-worker --target x86_64-unknown-none --target-dir \"$target_dir\" && init=\"$target_dir/x86_64-unknown-none/debug/nexus-init\" && provider=\"$target_dir/x86_64-unknown-none/debug/echo-provider\" && client=\"$target_dir/x86_64-unknown-none/debug/echo-client\" && worker=\"$target_dir/x86_64-unknown-none/debug/controller-worker\" && init_size=$(stat -c%s \"$init\") && provider_size=$(stat -c%s \"$provider\") && client_size=$(stat -c%s \"$client\") && worker_size=$(stat -c%s \"$worker\") && { timeout --foreground 30s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$init\",addr=0x7000000,force-raw=on -device loader,data=$init_size,data-len=8,addr=0x6fffff8 -device loader,file=\"$provider\",addr=0x2000000,force-raw=on -device loader,data=$provider_size,data-len=8,addr=0x1fffff8 -device loader,file=\"$client\",addr=0x3000000,force-raw=on -device loader,data=$client_size,data-len=8,addr=0x2fffff8 -device loader,file=\"$worker\",addr=0x4000000,force-raw=on -device loader,data=$worker_size,data-len=8,addr=0x3fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; qemu_code=$?; echo qemu_exit=$qemu_code; [ \"$qemu_code\" -eq 33 ]; }"
]

contracts = [
  "must.component.lazy_lifecycle_bootstrap",
]

expect = ["kernel: component manager bootstrap"]
forbid = ["KERNEL PANIC"]

[assertions.status_code]
resolve_root = 0
resolve_provider = 0
resolve_client = 0
provider_outgoing_pair = 0
provider_launch = 0
client_route = 0
client_launch = 0
provider_event_read = 0
client_event_read = 0
lazy_provider_route_launch = 0
stop_request = 0
stop_event_read = 0
kill_request = 0
kill_event_read = 0

[assertions.packet_fields]
failure_step = 0
provider_event_code = 0
client_event_code = 0
lazy_provider_prelaunch = 0
stop_event_code = 0
kill_event_code = 137
