id = "kernel.task.kill_process_bootstrap"
description = "Bootstrap task_kill should terminate a child process and reject new threads in that killed process"
tags = ["module:process", "module:task", "module:thread", "kind:qemu"]
timeout_ms = 180000
command = [
  "sh",
  "-c",
  "target_dir=target/conformance/default-int80 && cargo build -p axle-kernel -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && timeout --foreground 8s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x7000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x6fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; code=$?; echo qemu_exit=$code; [ \"$code\" -eq 33 ]"
]
expect = ["kernel: int80 conformance ok"]
forbid = ["KERNEL PANIC"]
contracts = ["should.task.kill_process_bootstrap"]

[assertions.status_code]
task_kill_process = 0
task_kill_thread_create_after = -20
