id = "kernel.runtime.net_dataplane_bootstrap"
description = "Bootstrap ring3 userspace should exercise one kernel-exported PCI-shaped multi-queue virtio-style transport slice on top of InterruptObject plus physical/contiguous VMO"
tags = ["kernel", "runtime", "net", "device", "bootstrap"]
timeout_ms = 180000

command = [
  "bash",
  "-c",
  "target_dir=target/conformance/net-smoke && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && AXLE_TEST_RUNNER_RUST_ENTRY=net_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && { timeout --foreground 20s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x7000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x6fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; qemu_code=$?; echo qemu_exit=$qemu_code; [ \"$qemu_code\" -eq 33 ]; }"
]

expect = [
  "kernel: net dataplane smoke",
]
forbid = ["KERNEL PANIC"]
contracts = []

[assertions.status_code]
ready_irq_create = 0
tx_irq_create = 0
rx_irq_create = 0
config_backing_create = 0
config_pin_create = 0
config_dma_lookup = 0
config_alias_create = 0
pci_config_info = 0
pci_config_map = 0
pci_config_caps_ok = 1
pci_config_common_bar = 0
pci_config_common_offset = 0
pci_config_notify_offset = 256
pci_config_isr_offset = 384
pci_config_device_offset = 512
pci_config_map_options = 32
pci_config_flags = 3
config_alias_pin_create = 0
config_alias_dma_lookup = 0
config_alias_map = 0
config_backing_map = 0
reg_backing_create = 0
reg_pin_create = 0
reg_dma_lookup = 0
reg_backing_map = 0
pci_irq_mode_info = 0
pci_irq_mode_set = 0
bar0_create = 0
bar0_pin_create = 0
bar0_dma_lookup = 0
bar0_dma_info = 0
bar0_map = 0
queue_vmo_create = 0
queue_pin_create = 0
queue_dma_lookup = 0
