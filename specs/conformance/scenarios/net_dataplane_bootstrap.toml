id = "kernel.runtime.net_dataplane_bootstrap"
description = "Bootstrap ring3 userspace should exercise one queue-owned shared-memory net dataplane slice on top of InterruptObject plus contiguous VMO"
tags = ["kernel", "runtime", "net", "device", "bootstrap"]
timeout_ms = 180000

command = [
  "bash",
  "-c",
  "target_dir=target/conformance/net-smoke && cargo build -p axle-kernel --target x86_64-unknown-none --target-dir \"$target_dir\" && AXLE_TEST_RUNNER_RUST_ENTRY=net_smoke RUSTFLAGS='-C code-model=large' cargo build -p nexus-test-runner --target x86_64-unknown-none --target-dir \"$target_dir\" && runner_src=\"$target_dir/x86_64-unknown-none/debug/nexus-test-runner\" && runner=$(mktemp /tmp/nexus-test-runner-XXXXXX) && cp \"$runner_src\" \"$runner\" && size=$(stat -c%s \"$runner\") && { timeout --foreground 20s qemu-system-x86_64 -machine q35 -m 256M -smp 2 -nographic -serial stdio -monitor none -no-reboot -device isa-debug-exit,iobase=0xf4,iosize=0x04 -device loader,file=\"$runner\",addr=0x7000000,force-raw=on -device loader,data=$size,data-len=8,addr=0x6fffff8 -kernel \"$target_dir/x86_64-unknown-none/debug/axle-kernel\"; qemu_code=$?; echo qemu_exit=$qemu_code; [ \"$qemu_code\" -eq 33 ]; }"
]

expect = [
  "kernel: net dataplane smoke",
]
forbid = ["KERNEL PANIC"]
contracts = []

[assertions.status_code]
ready_irq_create = 0
tx_irq_create = 0
rx_irq_create = 0
queue_vmo_create = 0
queue_lookup = 0
queue_map = 0
worker_thread_create = 0
worker_thread_start = 0
ready_wait = 0
ready_ack = 0
tx_kick = 0
worker_wait_kick = 0
worker_ack_kick = 0
worker_trigger_rx = 0
rx_wait = 0
rx_ack = 0

[assertions.packet_fields]
net_present = 1
net_failure_step = 0
tx_used_idx = 1
rx_used_idx = 1
tx_used_len = 42
rx_used_len = 42
packet_bytes = 32
packet_match = 1
