schema_version = 1

[[contracts]]
id = "must.syscall.bad_syscall_returns_bad_syscall"
level = "must"
description = "Unknown syscall number must return ZX_ERR_BAD_SYSCALL"
[contracts.concurrency]
mode = "not_applicable"
reason = "syscall surface contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.handle.close_double_returns_bad_handle"
level = "must"
description = "Closing the same handle twice must return ZX_ERR_BAD_HANDLE on second close"
[contracts.concurrency]
mode = "not_applicable"
reason = "handle ABI surface contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.handle.logical_destroy_stales_lookup"
level = "must"
description = "After logical destroy, ordinary handle use must return ZX_ERR_BAD_HANDLE for the stale handle"
[contracts.concurrency]
mode = "not_applicable"
reason = "handle/object lifetime contract exercised through syscall scenarios, not the host-side concurrent harness"

[[contracts]]
id = "must.handle.close_logically_destroyed_handle_ok"
level = "must"
description = "handle_close must succeed once on a logically destroyed handle so the last stale reference can drain"
[contracts.concurrency]
mode = "not_applicable"
reason = "handle/object lifetime contract exercised through syscall scenarios, not the host-side concurrent harness"

[[contracts]]
id = "must.port.wait_bad_handle_returns_bad_handle"
level = "must"
description = "zx_port_wait with invalid handle must return ZX_ERR_BAD_HANDLE"
[contracts.concurrency]
mode = "not_applicable"
reason = "invalid-handle syscall surface contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.port.wait_empty_returns_should_wait"
level = "must"
description = "zx_port_wait on empty valid port must return ZX_ERR_SHOULD_WAIT"
[contracts.concurrency]
mode = "not_applicable"
reason = "single-threaded syscall surface contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.port.queue_wait_roundtrip_ok"
level = "must"
description = "zx_port_queue + zx_port_wait must roundtrip packet data"
[contracts.concurrency]
mode = "not_applicable"
reason = "user-packet roundtrip contract; the concurrent harness models signal-packet traffic only"

[[contracts]]
id = "must.timer.set_cancel_ok"
level = "must"
description = "zx_timer_set and zx_timer_cancel must return ZX_OK for valid timer handle"
[contracts.concurrency]
mode = "not_applicable"
reason = "syscall return-code contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.smp.ipi_ack_fixed_vector"
level = "must"
description = "BSP must be able to deliver a fixed-vector IPI to an AP (ack observed)"
[contracts.concurrency]
mode = "not_applicable"
reason = "SMP arch contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.wait_async.timestamp_and_option_semantics"
level = "must"
description = "wait_async must reject invalid timestamp option combinations and emit non-zero timestamps when requested"
[contracts.concurrency]
mode = "not_applicable"
reason = "timestamp-option validation is a syscall/API contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.wait_async.edge_requires_transition"
level = "must"
description = "EDGE wait_async must not fire for an already-satisfied object until a false->true transition occurs"
[contracts.concurrency]
mode = "seeded"
system = "wait_port_timer"
hook_classes = ["waiter_linked", "signal_updated_before_wake"]
state_projections = ["wait_port_timer_blocked_waiters", "wait_port_timer_object_signals"]
expected_failure_kinds = ["hang.wait_port_timer", "hang.step_budget"]

[[contracts]]
id = "must.port.kernel_reserve_allows_signal_delivery"
level = "must"
description = "A user-filled port must still admit kernel-generated signal packets through the reserved region"
[contracts.concurrency]
mode = "seeded"
system = "wait_port_timer"
hook_classes = ["waiter_linked", "port_reserve_exhausted", "signal_updated_before_wake"]
state_projections = ["wait_port_timer_port_queue", "wait_port_timer_object_signals"]
expected_failure_kinds = ["hang.wait_port_timer"]

[[contracts]]
id = "must.port.pending_merge_flushes_signal"
level = "must"
description = "Kernel-generated signal packets must merge while pending on a full port and flush once space is available"
[contracts.concurrency]
mode = "seeded"
system = "wait_port_timer"
hook_classes = ["waiter_linked", "signal_updated_before_wake", "port_reserve_exhausted"]
state_projections = ["wait_port_timer_port_queue", "wait_port_timer_object_signals"]
expected_failure_kinds = ["hang.wait_port_timer"]

[[contracts]]
id = "must.port.readable_writable_bootstrap"
level = "must"
description = "Bootstrap ports must start WRITABLE, become READABLE after one queued packet, and report stable observed signal masks"
[contracts.concurrency]
mode = "not_applicable"
reason = "bootstrap port signal-state contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "should.vmo.create_bootstrap_anonymous"
level = "should"
description = "zx_vmo_create must reject bad bootstrap arguments and return a non-zero anonymous VMO handle on success"

[[contracts]]
id = "should.vmo.info_bootstrap_narrow_contract"
level = "should"
description = "ax_vmo_get_info must expose the current narrow public VMO contract for anonymous private objects and shared pager-backed image sources"

[[contracts]]
id = "must.vmar.map_protect_unmap_bootstrap"
level = "must"
description = "Root-VMAR bootstrap map/protect/unmap must commit an explicit anonymous mapping lifecycle with stable error codes and post-return visibility for the calling thread"
[contracts.concurrency]
mode = "not_applicable"
reason = "VMAR syscall and TLB visibility contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.vm.strict_tlb_visibility_phase1"
level = "must"
description = "Phase-one strict VM commits must complete required TLB invalidation before syscall return or frame reuse for map/protect/unmap, execute install/change, writable-to-readonly snapshot transitions, and remaps that replace live frames"
[contracts.concurrency]
mode = "not_applicable"
reason = "strict TLB visibility is a VM/TLB syscall-return contract exercised in QEMU scenarios; the host-side concurrent harness does not model shootdown completion"

[[contracts]]
id = "must.channel.create_write_read_bootstrap"
level = "must"
description = "Bootstrap channel create/write/read must preserve FIFO byte payloads and readable signaling"
[contracts.concurrency]
mode = "seeded"
system = "channel_handle"
hook_classes = ["waiter_linked"]
state_projections = ["channel_handle_waiters", "channel_handle_endpoints"]
expected_failure_kinds = ["hang.channel_handle", "budget_exhausted.channel_handle"]

[[contracts]]
id = "must.channel.peer_closed_bootstrap"
level = "must"
description = "Closing one bootstrap channel endpoint must immediately expose PEER_CLOSED on the peer and reject further writes"
[contracts.concurrency]
mode = "seeded"
system = "channel_handle"
hook_classes = ["waiter_linked", "channel_close_before_read_drain"]
state_projections = ["channel_handle_waiters", "channel_handle_endpoints"]
expected_failure_kinds = ["hang.channel_handle", "budget_exhausted.channel_handle"]

[[contracts]]
id = "must.channel.page_loan_snapshot_bootstrap"
level = "must"
description = "Page-aligned bootstrap channel writes must preserve the send-time snapshot even if the sender mutates its mapping before the peer reads"
[contracts.concurrency]
mode = "not_applicable"
reason = "page-loan snapshot contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.channel.fragmented_payload_bootstrap"
level = "must"
description = "Bootstrap fragmented channel payloads must preserve mixed head/body/tail bytes across both exact-body remap reads and fallback-copy reads"
[contracts.concurrency]
mode = "not_applicable"
reason = "fragmented channel loan/read contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "should.channel.page_loan_remap_fill_cow_bootstrap"
level = "should"
description = "Page-aligned bootstrap channel remap-fill reads should trigger one receiver-side COW split on first write, preserve the sender snapshot, and keep reverse-mapping cardinality stable across the split"

[[contracts]]
id = "should.channel.page_loan_quota_bootstrap"
level = "should"
description = "Bootstrap full-page loan writes should respect the in-flight loan-page quota, return SHOULD_WAIT before channel capacity is exhausted, and recover after reads release quota"

[[contracts]]
id = "must.channel.close_read_order_bootstrap"
level = "must"
description = "Bootstrap channel reads must drain queued messages before surfacing PEER_CLOSED-only state, and READABLE may coexist with PEER_CLOSED"
[contracts.concurrency]
mode = "seeded"
system = "channel_handle"
hook_classes = ["channel_close_before_read_drain", "waiter_linked"]
state_projections = ["channel_handle_waiters", "channel_handle_endpoints"]
expected_failure_kinds = ["hang.channel_handle", "budget_exhausted.channel_handle"]

[[contracts]]
id = "must.channel.writable_recovery_bootstrap"
level = "must"
description = "Bootstrap channel WRITABLE must clear on full peer queues, recover after reads, and stay cleared once the peer closes"
[contracts.concurrency]
mode = "not_applicable"
reason = "channel backpressure/writable contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "must.channel.wait_async_signal_bootstrap"
level = "must"
description = "Bootstrap channel wait_async and port_wait must deliver WRITABLE recovery and PEER_CLOSED transitions with stable signal packets and no stale WRITABLE republish after peer close"
[contracts.concurrency]
mode = "not_applicable"
reason = "channel signal delivery through kernel ports is exercised by QEMU bootstrap scenarios, not the current host-side concurrent harness"

[[contracts]]
id = "must.channel.handle_transfer_bootstrap"
level = "must"
description = "Bootstrap channel write/read must move transferred handles, invalidate the sender copy, and make the received handle immediately usable"
[contracts.concurrency]
mode = "not_applicable"
reason = "handle-transfer contract; not modeled by the host-side concurrent harness"

[[contracts]]
id = "should.eventpair.signal_peer_bootstrap"
level = "should"
description = "Bootstrap eventpair create and signal_peer should drive peer user signals with stable error codes"

[[contracts]]
id = "should.eventpair.peer_closed_bootstrap"
level = "should"
description = "Closing one bootstrap eventpair endpoint should immediately expose PEER_CLOSED on the peer"

[[contracts]]
id = "should.handle.duplicate_replace_bootstrap"
level = "should"
description = "Bootstrap handle_duplicate and handle_replace should preserve object identity while enforcing reduced rights and invalidating replaced handles"

[[contracts]]
id = "should.eventpair.signal_self_bootstrap"
level = "should"
description = "Bootstrap object_signal should drive local EventPair user signals and wait_async delivery with stable error codes"

[[contracts]]
id = "should.futex.wait_timeout_bootstrap"
level = "should"
description = "Bootstrap futex wait should report BAD_STATE on mismatched values, reject self-owner waits, and time out without retaining ownership"

[[contracts]]
id = "should.futex.requeue_owner_bootstrap"
level = "should"
description = "Bootstrap futex requeue/get_owner/wake should preserve owner metadata with stable error codes for same-key and wrong-type cases"

[[contracts]]
id = "should.thread.create_start_futex_wake_bootstrap"
level = "should"
description = "Bootstrap thread_create/thread_start should allow a second userspace thread to wake a futex wait through scheduler-backed handoff"

[[contracts]]
id = "should.thread.scheduler_wait_paths_bootstrap"
level = "should"
description = "Bootstrap worker threads should wake wait_one and port_wait through the scheduler-backed handoff path"

[[contracts]]
id = "must.scheduler.l0_per_cpu_wake_phase1"
level = "must"
description = "Phase-one L0 scheduler must drive wait/futex/port/timer completions across CPUs via per-CPU runnable state, remote wakeup, and reschedule IPIs without relying on one global run queue"
[contracts.concurrency]
mode = "not_applicable"
reason = "per-CPU scheduler topology and reschedule IPIs are exercised in QEMU/SMP scenarios; the host-side concurrent harness does not model CPU-local run queues"

[[contracts]]
id = "should.process.create_child_thread_bootstrap"
level = "should"
description = "Bootstrap process_create/process_start should yield a real child address space that can map shared VMOs and run a child thread"

[[contracts]]
id = "must.process.generic_launch_phase1"
level = "must"
description = "Phase-one process_start must keep the current ABI while accepting a non-invalid arg_handle, using the generic image-launch path, and allowing child launch/exit/reap without bootstrap-only launch semantics"
[contracts.concurrency]
mode = "not_applicable"
reason = "generic launch is a process/image ABI contract exercised in QEMU scenarios; the host-side concurrent harness does not model userspace image bring-up"

[[contracts]]
id = "must.vm.execute_mapping_phase1"
level = "must"
description = "Phase-one VMAR map/protect must surface ZX_VM_PERM_EXECUTE and ZX_VM_CAN_MAP_EXECUTE, enforce execute-cap checks, and reject process/thread start entries that are not executable user mappings"
[contracts.concurrency]
mode = "not_applicable"
reason = "execute-cap and launch-entry validation are QEMU/VM syscall contracts; the host-side concurrent harness does not currently model executable mappings"

[[contracts]]
id = "should.task.kill_process_bootstrap"
level = "should"
description = "Bootstrap task_kill should terminate a child process so subsequent thread creation against it fails with BAD_STATE"

[[contracts]]
id = "should.task.terminated_wait_bootstrap"
level = "should"
description = "Bootstrap task termination should become observable via wait_one on child thread/process handles, and closing those terminated handles should succeed cleanly"

[[contracts]]
id = "should.task.suspend_process_bootstrap"
level = "should"
description = "Bootstrap task_suspend should return a suspend token, keep a child process quiesced while the token is open, and resume it once the token closes"

[[contracts]]
id = "should.process.lazy_shared_vmo_bootstrap"
level = "should"
description = "Bootstrap parent/child shared anonymous VMO mappings should lazily fault through the global VMO path without splitting into distinct frames"

[[contracts]]
id = "should.vmar.allocate_child_bootstrap"
level = "should"
description = "Bootstrap zx_vmar_allocate/zx_vmar_destroy should support nested child VMARs, specific offsets, compact child policy, upper-limit placement, aligned placement, CAN_MAP_SPECIFIC ceilings, and recursive destroy cleanup"

[[contracts]]
id = "should.vmar.far_range_bootstrap"
level = "should"
description = "Bootstrap VMAR mapping should support mappings far beyond the original 2 MiB bridge, including addresses that require a new top-level walk path"

[[contracts]]
id = "should.vmar.child_metadata_stability_bootstrap"
level = "should"
description = "Bootstrap child VMAR mappings should coexist with far root mappings without losing mapping identity, destroy cleanup, or sparse page-table metadata stability"

[[contracts]]
id = "should.timer.wait_forever_bootstrap"
level = "should"
description = "An infinite wait_one on a timer should block through trap-exit and resume when the timer IRQ wakes the current thread"

[[contracts]]
id = "must.vm.same_page_fault_contention_bootstrap"
level = "must"
description = "Bootstrap same-page faults must serialize so only one leader materializes the page while local and shared contenders block and resume"
[contracts.concurrency]
mode = "seeded"
system = "futex_fault"
hook_classes = ["fault_leader_claimed", "fault_heavy_prepare_before_commit", "fault_tx_before_commit"]
state_projections = ["futex_fault_inflight_shape"]
expected_failure_kinds = ["hang.futex_fault", "hang.step_budget"]

[[contracts]]
id = "should.vmo.read_write_resize_bootstrap"
level = "should"
description = "Bootstrap VMO syscalls should support basic read/write, page-aligned grow/shrink, and reject shrinking a mapped tail or writing beyond the resized end"

[[contracts]]
id = "should.vmo.shared_bootstrap_contract"
level = "should"
description = "Bootstrap shared pager-backed/file-backed VMO handles should remain readable but reject direct write and resize through the shared source handle"

[[contracts]]
id = "should.vmo.staged_shared_source_handle_contract"
level = "should"
description = "Staged shared-anonymous GetVmo handles for boot assets should report Anonymous + GlobalShared and remain readable but reject direct write and resize through the exported source handle"

[[contracts]]
id = "should.vmo.anonymous_promotion_bootstrap_contract"
level = "should"
description = "Fresh anonymous VMOs should report LocalPrivate before cross-process transfer and promote to GlobalShared in both exporter and importer after transfer/install"

[[contracts]]
id = "should.socket.stream_basics_bootstrap"
level = "should"
description = "Bootstrap STREAM sockets should support create, waitable readable/writable states, peek, read, peer-close signaling, and peer-closed read/write errors"

[[contracts]]
id = "should.socket.stream_backpressure_bootstrap"
level = "should"
description = "Bootstrap STREAM sockets should allow short writes under backpressure, return SHOULD_WAIT when full, and become writable again after the peer drains buffered bytes"

[[contracts]]
id = "should.socket.duplicate_peer_close_bootstrap"
level = "should"
description = "Bootstrap STREAM sockets should not report PEER_CLOSED while duplicated peer-end handles remain live, but should report it once the last duplicate closes"

[[contracts]]
id = "should.socket.options_args_bootstrap"
level = "should"
description = "Bootstrap STREAM sockets should reject unsupported creation/options combinations, allow zero-byte null writes, reject null read buffers, and allow reads with a null actual pointer"

[[contracts]]
id = "should.socket.wait_async_bootstrap"
level = "should"
description = "Bootstrap STREAM sockets should integrate with object_wait_async so writes make a port wait readable and consumable through zx_port_wait"

[[contracts]]
id = "should.socket.wait_paths_bootstrap"
level = "should"
description = "Bootstrap STREAM sockets should support immediate WRITABLE async waits and keep wait semantics stable across duplicate-handle traffic"

[[contracts]]
id = "should.socket.duplicate_data_bootstrap"
level = "should"
description = "Bootstrap STREAM sockets should allow duplicated handles to keep read/write traffic alive after the original endpoint handle closes"

[[contracts]]
id = "should.socket.backpressure_stats_bootstrap"
level = "should"
description = "Bootstrap STREAM sockets should report stable short-write and would-block telemetry when the fixed-capacity buffer fills and drains"

[[contracts]]
id = "should.socket.datagram_bootstrap"
level = "should"
description = "Bootstrap DATAGRAM sockets should preserve message boundaries, support peek, truncate on narrow reads, exert bounded backpressure without short writes, and surface peer-closed state through the shared socket signal family"

[[contracts]]
id = "must.runtime.libzircon_bootstrap"
level = "must"
description = "Phase-three bootstrap userspace must expose a thin libzircon wrapper layer that can drive port, channel, timer, and handle-close syscalls from Rust ring3 code without handwritten per-syscall assembly"
[contracts.concurrency]
mode = "not_applicable"
reason = "bootstrap userspace runtime gate; exercised by a dedicated QEMU ring3 scenario"

[[contracts]]
id = "must.runtime.reactor_bootstrap"
level = "must"
description = "Phase-three bootstrap userspace must provide a single-thread dispatcher/executor with generation-safe signal registrations, one dispatcher timer, and non-busy channel/socket/timer progress"
[contracts.concurrency]
mode = "not_applicable"
reason = "bootstrap userspace runtime gate; exercised by a dedicated QEMU ring3 scenario"

[[contracts]]
id = "must.component.eager_topology_bootstrap"
level = "must"
description = "Phase-three minimal nexus-init plus ElfRunner should resolve a root manifest, launch eager child components from the bootstrap code image, route one protocol through `/svc`, and collect `OnTerminated` controller events from those children"
[contracts.concurrency]
mode = "not_applicable"
reason = "minimal component-manager bootstrap gate; exercised by a dedicated QEMU ring3 scenario"

[[contracts]]
id = "must.component.lazy_lifecycle_bootstrap"
level = "must"
description = "Phase-three minimal nexus-init should resolve children through resolver capability lookup, lazy-start a routed provider, drive Stop/Kill controller requests, and observe `OnTerminated` controller events for those lifecycle-controlled children"
[contracts.concurrency]
mode = "not_applicable"
reason = "bootstrap component-manager lifecycle gate; exercised by a dedicated QEMU ring3 scenario"
