# Axle syscalls spec (Phase A bootstrap)
#
# This file is the "single source of truth" for:
# - syscall names
# - (optional) syscall numbers
# - argument/return ABI surface (types as strings for now)
# - contract level (MUST/SHOULD/MAY) for Zircon-compat personality

[[syscall]]
name = "handle_close"
nr = 0
must = true
ret = "zx_status_t"
args = [
  { name = "handle", ty = "zx_handle_t" },
]

[[syscall]]
name = "object_wait_one"
nr = 1
must = true
ret = "zx_status_t"
args = [
  { name = "handle", ty = "zx_handle_t" },
  { name = "signals", ty = "zx_signals_t" },
  { name = "deadline", ty = "zx_time_t" },
  { name = "observed", ty = "*mut zx_signals_t" },
]

[[syscall]]
name = "object_wait_async"
nr = 2
must = true
ret = "zx_status_t"
args = [
  { name = "handle", ty = "zx_handle_t" },
  { name = "port", ty = "zx_handle_t" },
  { name = "key", ty = "u64" },
  { name = "signals", ty = "zx_signals_t" },
  { name = "options", ty = "u32" },
]

[[syscall]]
name = "port_create"
nr = 3
must = true
ret = "zx_status_t"
args = [
  { name = "options", ty = "u32" },
  { name = "out", ty = "*mut zx_handle_t" },
]

[[syscall]]
name = "port_queue"
nr = 4
must = true
ret = "zx_status_t"
args = [
  { name = "port", ty = "zx_handle_t" },
  { name = "packet", ty = "*const zx_port_packet_t" },
]

[[syscall]]
name = "port_wait"
nr = 5
must = true
ret = "zx_status_t"
args = [
  { name = "port", ty = "zx_handle_t" },
  { name = "deadline", ty = "zx_time_t" },
  { name = "packet", ty = "*mut zx_port_packet_t" },
]

[[syscall]]
name = "timer_create"
nr = 6
must = true
ret = "zx_status_t"
args = [
  { name = "options", ty = "u32" },
  { name = "clock_id", ty = "zx_clock_t" },
  { name = "out", ty = "*mut zx_handle_t" },
]

[[syscall]]
name = "timer_set"
nr = 7
must = true
ret = "zx_status_t"
args = [
  { name = "handle", ty = "zx_handle_t" },
  { name = "deadline", ty = "zx_time_t" },
  { name = "slack", ty = "zx_duration_t" },
]

[[syscall]]
name = "timer_cancel"
nr = 8
must = true
ret = "zx_status_t"
args = [
  { name = "handle", ty = "zx_handle_t" },
]

# Channel will be added once the "page-borrow + COW" design is ready to implement.
