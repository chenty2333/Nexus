# Axle syscalls spec (Phase A bootstrap)
#
# This file is the "single source of truth" for:
# - syscall names
# - (optional) syscall numbers
# - argument/return ABI surface (types as strings for now)
# - contract level (MUST/SHOULD/MAY) for Zircon-compat personality

[[syscall]]
name = "handle_close"
nr = 0
must = true
ret = "zx_status_t"
args = [
  { name = "handle", ty = "zx_handle_t" },
]

[[syscall]]
name = "object_wait_one"
nr = 1
must = true
ret = "zx_status_t"
args = [
  { name = "handle", ty = "zx_handle_t" },
  { name = "signals", ty = "zx_signals_t" },
  { name = "deadline", ty = "zx_time_t" },
  { name = "observed", ty = "*mut zx_signals_t" },
]

[[syscall]]
name = "object_wait_async"
nr = 2
must = true
ret = "zx_status_t"
args = [
  { name = "handle", ty = "zx_handle_t" },
  { name = "port", ty = "zx_handle_t" },
  { name = "key", ty = "u64" },
  { name = "signals", ty = "zx_signals_t" },
  { name = "options", ty = "u32" },
]

