# Axle syscalls spec (Phase A bootstrap)
#
# This file is the "single source of truth" for:
# - syscall names
# - (optional) syscall numbers
# - argument/return ABI surface (types as strings for now)
# - contract level (MUST/SHOULD/MAY) for the native Axle personality

[[syscall]]
name = "handle_close"
nr = 0
must = true
ret = "ax_status_t"
args = [
  { name = "handle", ty = "ax_handle_t" },
]

