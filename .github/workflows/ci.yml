name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Verify CSER models, specifications, scheduler/pager/Linux futex, and mediated VirtIO
        run: ./x verify
      - name: Upload failure evidence
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nexus-verification-evidence
          if-no-files-found: ignore
          path: |
            target/scenario-artifacts
            target/verification
            experiments/ostd-cser-spike/artifacts
            experiments/ostd-virtio-cser-spike/artifacts
