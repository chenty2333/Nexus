name: ci

on:
  push:
  pull_request:

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: syscall spec consistency
        run: nix develop -c just check-syscalls
      - name: fmt
        run: nix develop -c just fmt-check
      - name: clippy
        run: nix develop -c just xlint
      - name: tests
        run: nix develop -c just xtest
