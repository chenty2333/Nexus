[[row]]
id = "resource-containers"
primary_source = "Banga, Druschel, and Mogul, Resource Containers: A New Facility for Resource Management in Server Systems, OSDI 1999, https://www.usenix.org/legacy/events/osdi99/full_papers/banga/banga.pdf"
source_locator = "abstract and sections 3-4.1"
mechanism = "Resource containers separate protection domains from resource principals and charge user- and kernel-level consumption for one independent activity to an explicit container."
authority_scope = "An application-defined independent activity such as servicing one client connection."
async_effect_tracking = "Kernel network processing is associated with the activity for accounting, but effect lifecycle and terminalization are not tracked."
commit_or_linearization_gate = "Not established."
crash_or_rebind_fencing = "Not established."
resource_accounting = "Present: CPU time, memory, sockets, protocol control blocks, and network buffers are attributed to a resource container for scheduling and limits."
device_quiescence = "Not established."
overlap_with_cser = "It directly precedes separating an activity's causal/resource principal from a process and charging kernel work to that principal."
difference_from_fixed_cser_boundary = "Resource containers account and schedule consumption; they do not revoke the activity's derived effects, close commit gates, or enforce single terminalization."
claim_impact = "Scoped resource accounting is prior art; CSER's typed budget ingredient cannot be claimed in isolation."

[[row]]
id = "fuchsia.rfc-0261"
primary_source = "Fuchsia RFC-0261, Fast and efficient user space kernel emulation, accepted 2024-01-19, https://fuchsia.dev/fuchsia-src/contribute/governance/rfcs/0261_fast_and_efficient_user_space_kernel_emulation"
source_locator = "Summary, Motivation, Design, and Element 1: restricted mode"
mechanism = "Restricted Mode lets a normal-mode Fuchsia program supervise untrusted guest code using restricted address/register state, direct access, and shared state for a user-space kernel programming model."
authority_scope = "A Zircon thread/process executing guest code under a normal-mode user-space supervisor."
async_effect_tracking = "Not established as a causal registry of effects derived from supervisor authority."
commit_or_linearization_gate = "Not established as a cross-domain effect commit gate."
crash_or_rebind_fencing = "Not established as dual authority and supervisor-binding epochs."
resource_accounting = "Not established as conserved per-scope credits."
device_quiescence = "Not established."
overlap_with_cser = "It is a close implementation-shape precedent for efficient kernel-supported user-space OS supervision and Starnix execution."
difference_from_fixed_cser_boundary = "The RFC defines the execution substrate and supervisor/guest transition, not uniform revocation and reclamation of derived scheduler, pager, personality, filesystem, network, readiness, and VirtIO effects."
claim_impact = "User-space kernel supervision and the Starnix execution shape are prior art and explicitly excluded from the CSER contribution boundary."

[[row]]
id = "linux.io-uring-cancel"
primary_source = "Jens Axboe, liburing io_uring_prep_cancel(3), pinned repository revision e50e32a6b9030faba2e30fa0ba999571a0cffe28, https://github.com/axboe/liburing/blob/e50e32a6b9030faba2e30fa0ba999571a0cffe28/man/io_uring_prep_cancel.3"
source_locator = "DESCRIPTION, ERRORS, and NOTES"
mechanism = "An asynchronous cancel request matches pending operations by user_data, file descriptor, opcode, or broad criteria and reports success, not-found, invalid, or too-late status through its CQE."
authority_scope = "Requests in one io_uring selected by matching keys and flags."
async_effect_tracking = "Present at ring-request granularity through request identity and completion events."
commit_or_linearization_gate = "If execution has progressed too far, cancellation returns EALREADY and the caller must await the target's completion; successful cancellation posts the target completion before submission returns."
crash_or_rebind_fencing = "Not established as service rebind fencing."
resource_accounting = "Completion ordering constrains when a canceled request is finished, but typed conserved resource credits are not exposed."
device_quiescence = "Not established as a general device reset/DMA guarantee."
overlap_with_cser = "It directly precedes asynchronous cancel-versus-complete races, too-late cancellation, and explicit terminal completion observation."
difference_from_fixed_cser_boundary = "io_uring cancellation targets ring requests and matching keys; it does not recursively revoke a root authority across OS services or define device-owner tombstones."
claim_impact = "Asynchronous I/O cancellation and too-late status are prior interface semantics; CSER's claim must be the bounded composition around them."

[[row]]
id = "virtio-1.3-reset"
primary_source = "OASIS, Virtual I/O Device (VIRTIO) Version 1.3, Committee Specification Draft 01, 2023-10-06, https://docs.oasis-open.org/virtio/virtio/v1.3/virtio-v1.3.pdf"
source_locator = "sections 2.1, 2.4, 2.6.1, and 3.3"
mechanism = "Device and virtqueue reset protocols stop queue execution and notification, restore reset state, require the driver to verify reset, and constrain when exposed buffers or queue resources may be released."
authority_scope = "A virtio device or individually resettable virtqueue and its exposed buffers."
async_effect_tracking = "Virtqueues track available and used descriptors, but the specification does not define an OS authority-derived causal effect registry."
commit_or_linearization_gate = "A live queue's exposed buffers must not be altered; reset verification is required before queue resources may be released."
crash_or_rebind_fencing = "Device status and reset fence old queue activity, but a restartable user-space service binding epoch is not specified."
resource_accounting = "The driver retains queue-associated resources until reset succeeds; general conserved service credits are outside the specification."
device_quiescence = "Present: after device-reset completion the device must not notify or interact with queues, and after queue reset it must not execute requests or notify the driver."
overlap_with_cser = "It supplies the protocol boundary for honest post-publication reset, quiescence, and deferred resource release."
difference_from_fixed_cser_boundary = "VirtIO specifies device/queue behavior only; it does not connect reset to a root authority, service epochs, cross-domain reverse indexes, or budget closure."
claim_impact = "Device reset and queue-resource retention are standardized prior mechanisms; CSER can only evaluate their integration into its fixed causal scope."
