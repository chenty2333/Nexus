schema = "nexus.stage7b.prior-art.v1"
contract = "evaluation/stage7b/contract.toml"
source_policy = "primary-source-required"
source_card_directory = "evaluation/stage7b/prior-art-sources"
expected_count = 16
default_contribution_decision = "narrow"
decision_note = "Fifteen rows were audited against retrievable primary full text, specifications, or API documentation. The author-hosted Shadow Drivers paper is now full-text audited. The Atomic RPC publisher record was reachable but its full text remains unavailable to this audit, so that comparison dimension remains unresolved and cannot support a stronger decision."

[[row]]
id = "sel4.reply-capability-revoke"
primary_source = "seL4 Foundation, seL4 Reference Manual, retrieved 2026-07-13 from https://sel4.systems/Info/Docs/seL4-manual-latest.pdf"
source_locator = "sections 2.4.1, 3.2, and 4.2.4"
mechanism = "A capability derivation tree supports recursive revocation of derived capabilities; reply authority is represented by a single-use reply capability or MCS reply object."
authority_scope = "Capability derivation from a selected capability, plus one caller-specific reply authority."
async_effect_tracking = "Partial: the kernel tracks blocked callers and reply authority, but the audited sections do not define a general causal registry for timers, I/O, and other derived effects."
commit_or_linearization_gate = "Invoking the reply authority sends the reply and consumes the single-use right; ordinary capability revoke removes CDT descendants."
crash_or_rebind_fencing = "Not established in the audited sections as a service binding epoch or replacement-service handshake."
resource_accounting = "Not established in the audited sections as conserved per-scope credits."
device_quiescence = "Not established in the audited sections."
overlap_with_cser = "One-shot reply authority and recursive withdrawal of derived authority are direct ingredients of the CSER boundary."
difference_from_fixed_cser_boundary = "The manual states that a non-MCS reply capability becomes unrelated to the original endpoint, so endpoint destruction does not itself close that reply; the audited mechanism does not compose all seven Nexus domains under one effect scope."
claim_impact = "Basic capability revocation and one-shot reply authority are prior ingredients; any supported CSER contribution must be limited to the fixed cross-domain composition and its additional gates."

[[row]]
id = "cornucopia.async-authority"
primary_source = "Filardo et al., Cornucopia: Temporal Safety for CHERI Heaps, IEEE S&P 2020, https://doi.org/10.1109/SP40000.2020.00098"
source_locator = "sections III and IV-A, especially the discussion of kernel-hoarded user capabilities and asynchronous I/O"
mechanism = "A kernel-resident CHERI capability sweeper revokes capabilities into quarantined heap regions before the allocator may reuse those regions."
authority_scope = "Capabilities into quarantined allocations within a CheriABI address space."
async_effect_tracking = "Present but specialized: the revoker handles capabilities hoarded in kernel subsystems, and the asynchronous-I/O handler cancels associated requests."
commit_or_linearization_gate = "Reuse is delayed until the revocation sweep completes; the audited source does not expose a general prepare/commit gate for heterogeneous effects."
crash_or_rebind_fencing = "Not established as restartable-service binding fencing."
resource_accounting = "Quarantine delays memory reuse, but the audited source does not define conserved typed credits across OS services."
device_quiescence = "Not established as device reset, DMA drain, or IOMMU invalidation."
overlap_with_cser = "It combines capability revocation, delayed reclamation, kernel-held authority discovery, and explicit treatment of asynchronous I/O."
difference_from_fixed_cser_boundary = "Its target is heap temporal safety using address-space sweeping, not proportional closure of a root authority across scheduler, pager, personality, filesystem, network, readiness, and VirtIO domains."
claim_impact = "Revocation that reaches authority retained by asynchronous kernel facilities is a prior ingredient; CSER cannot claim that idea in isolation."

[[row]]
id = "portico-lingering-authority"
primary_source = "Igor Santos-Grueiro, Lingering Authority: Revocable Resource-and-Effect Capabilities for Coding Agents, arXiv:2606.22504v1, https://arxiv.org/abs/2606.22504"
source_locator = "abstract and sections 2-4, including the request-grant-invoke lifecycle and authority closure"
mechanism = "PORTICO compiles task contracts into typed resource/effect capabilities, mints opaque epoch-bound grant handles, removes them at trusted closure, and rejects stale replay before side effects."
authority_scope = "A coding-agent task and its explicitly declared temporary subgoal grants."
async_effect_tracking = "The mediated tool catalog identifies resource and effect authority, but the audited model is not a kernel causal graph of outstanding asynchronous OS effects."
commit_or_linearization_gate = "Invocation validates the epoch-bound handle before the mediated side effect; closure removes the grant from later planner interfaces."
crash_or_rebind_fencing = "Epochs reject stale grant replay, but the audited setting does not model a crashed OS service and replacement binding handshake."
resource_accounting = "Authority exposure is tracked; consumable CPU, page, queue, byte, and DMA credits are not the evaluated abstraction."
device_quiescence = "Not established."
overlap_with_cser = "Resource-and-effect capabilities, scoped lifetime, epochs, closure, and pre-effect stale rejection closely overlap CSER terminology and mechanism ingredients."
difference_from_fixed_cser_boundary = "PORTICO mediates coding-agent tool authority under a fixed host sandbox; it does not close a seven-domain user-space OS authority, retain post-commit device tombstones, or measure reverse-index closure."
claim_impact = "This close recent work requires the CSER claim to stay at the kernel-enforced multi-service composition boundary, not generic scoped effect capability revocation."

[[row]]
id = "vino.extension-fallback"
primary_source = "Seltzer et al., Dealing With Disaster: Surviving Misbehaved Kernel Extensions, OSDI 1996, https://doi.org/10.1145/248155.238779"
source_locator = "table 1 and sections 3.1-3.2"
mechanism = "VINO executes each graft invocation inside a lightweight transaction, logs undo actions, aborts misbehaving or resource-hoarding grafts, and invokes the default function after abort."
authority_scope = "One installed kernel graft and an individual graft invocation transaction."
async_effect_tracking = "Event handlers are supported, but the audited transaction is invocation-scoped rather than a cross-service registry of descendants and outstanding asynchronous effects."
commit_or_linearization_gate = "The wrapper begins a transaction before the graft and commits when it returns; abort runs the undo stack and falls back to the default implementation."
crash_or_rebind_fencing = "Not established as a service binding epoch or replacement handshake."
resource_accounting = "Present: quantity limits can be transferred to or billed against a graft, and time-constrained resources can trigger transaction abort."
device_quiescence = "Not established; the transaction design is for undoable volatile kernel actions and does not establish post-publication DMA quiescence."
overlap_with_cser = "Commit/abort, bounded resource use, failure containment, and a kernel-owned default path are direct mechanism precedents."
difference_from_fixed_cser_boundary = "VINO relies on per-invocation undo transactions for in-kernel extensions; CSER's fixed boundary instead distinguishes pre-commit abort from honest post-commit drain, reset, or tombstone across restartable user-space services."
claim_impact = "Transaction gates, resource limits, and fallback are prior ingredients and must not be presented as standalone CSER contributions."

[[row]]
id = "curios.restartable-services"
primary_source = "David et al., CuriOS: Improving Reliability through Operating System Structure, OSDI 2008, https://www.usenix.org/legacy/events/osdi08/tech/full_papers/david/david.pdf"
source_locator = "abstract and sections 1, 4, and 5"
mechanism = "CuriOS distributes client-specific state into protected client-associated memory so it survives service restart, while isolating services and granting state access during request processing."
authority_scope = "A microkernel OS service and per-client persistent service state."
async_effect_tracking = "Not established in the audited sections as a uniform causal registry of continuations, waits, timers, and device requests."
commit_or_linearization_gate = "Not established as a heterogeneous effect commit gate."
crash_or_rebind_fencing = "Service failure and transparent restart are central, but the audited design does not establish dual authority and binding epochs for stale reply fencing."
resource_accounting = "Not established as per-scope conserved credits."
device_quiescence = "The evaluated services include drivers, but the audited mechanism does not establish reset acknowledgement, DMA drain, or IOMMU invalidation as closure conditions."
overlap_with_cser = "It directly precedes restartable user-space OS services, persistent client state, and recovery across filesystem, network, timer, and scheduler services."
difference_from_fixed_cser_boundary = "CuriOS protects and persists service state; the fixed CSER boundary instead closes derived effects and credits with commit/revoke ordering, stale-binding rejection, and explicit device tombstones."
claim_impact = "Restartable multi-service OS structure is prior work; a CSER decision must rest on the narrower effect-lifetime composition."

[[row]]
id = "shadow-drivers.device-recovery"
primary_source = "Swift, Annamalai, Bershad, and Levy, Recovering Device Drivers, OSDI 2004, https://www.usenix.org/conference/osdi-04/recovering-device-drivers"
source_locator = "sections 3.2-4.5, especially 4.2 Passive-Mode Monitoring, 4.3 Active-Mode Recovery, and 4.5 Limitations"
mechanism = "A class-specific shadow driver passively monitors replicated kernel-driver calls and records recovery state; after a fail-stop driver failure, taps redirect calls to the shadow while it proxies service, restarts a clean driver, reconnects existing kernel resources, restores configuration, and resumes or cancels outstanding requests."
authority_scope = "One device-driver instance and its class-specific shadow, including connections, configuration, pending commands, outstanding packets, and kernel objects. The paper does not define one request-derived authority root spanning multiple restartable OS services."
async_effect_tracking = "Present for the device boundary: pending commands remain logged until handled, outstanding packets retain tracked references, and the shadow records timers, interrupt lines, and I/O regions. Tracking follows one driver interface and cannot observe ad-hoc shared-memory communication; it is not a registry-native causal descendant tree."
commit_or_linearization_gate = "The paper explicitly states that shadow drivers cannot guarantee exactly-once behavior: after device submission but before kernel completion notification, the shadow cannot know whether a request ran and must choose between replay with duplication risk and cancellation with loss risk. It defines no revoke-versus-device-commit gate or one-shot guest-result publication."
crash_or_rebind_fencing = "Active taps cut driver-kernel communication, a clean driver is reinitialized, existing registrations and callbacks are reattached, and taps return to passive mode after state transfer. No binding generation, stale callback or ticket validation, or identity-preserving cross-service adoption protocol is specified."
resource_accounting = "Nooks object tracking lets the shadow retain kernel-visible service objects, garbage-collect other driver resources, and reuse existing registrations during restart. The paper does not define a conserved typed-credit ledger shared by multiple services."
device_quiescence = "Recovery disables the device and interrupt line and, where the platform supports I/O memory mapping, removes mappings to prevent DMA before restart; resources are later re-enabled as the driver is reattached. The paper defines neither reset and IOTLB acknowledgement nor generation-checked ownership or a retained same-effect tombstone, and it assumes no irreversible side effect that recovery would need to undo."
overlap_with_cser = "Direct overlap includes request and configuration tracking, proxying across driver restart, outstanding-request replay or cancellation, IRQ and DMA-mapping fencing, retained resource identity, and explicit recognition that post-submission completion may be unknowable."
difference_from_fixed_cser_boundary = "Shadow Drivers conceals failure and applies class-specific replay or cancellation despite post-submit ambiguity. Fixed CSER instead composes one canonical production authority and shared ledger across personality, filesystem, block, and device domains, orders revocation against commit, and reports indeterminate post-commit closure while retaining ownership until reset and IOTLB acknowledgement."
claim_impact = "Shadow Drivers establishes device recovery, interface-level effect tracking, resource reattachment, IRQ and DMA fencing, and post-submit ambiguity as prior ingredients. A CSER contribution must therefore rest on canonical cross-service identity, generational fencing, shared conserved ownership, and an explicit honest closure and tombstone result rather than those ingredients separately."

[[row]]
id = "txos.os-transactions"
primary_source = "Porter et al., Operating System Transactions, SOSP 2009, https://doi.org/10.1145/1629575.1629591"
source_locator = "sections 1 and 3, especially sys_xbegin, sys_xend, sys_xabort, isolation, and publication at commit"
mechanism = "TxOS groups system calls over heterogeneous OS resources into ACID system transactions with abort and atomic publication."
authority_scope = "An application-defined system transaction spanning files, memory management, signals, and process creation."
async_effect_tracking = "Transaction state and touched OS resources are tracked, but the audited mechanism is not an authority-derived reverse index of heterogeneous asynchronous effects."
commit_or_linearization_gate = "Transactional accesses remain isolated until sys_xend commit, when updates are atomically published; sys_xabort discards an in-progress transaction."
crash_or_rebind_fencing = "Durability and crash consistency are addressed, but a restartable policy-service binding epoch is not established."
resource_accounting = "Fair contention is discussed, but conserved per-scope typed credits are not the audited abstraction."
device_quiescence = "Not established."
overlap_with_cser = "Explicit begin/commit/abort and delayed publication across OS resources precede CSER's commit-gate ingredient."
difference_from_fixed_cser_boundary = "TxOS offers transaction rollback and atomic durability; fixed CSER revokes authority and explicitly refuses to call already externalized effects rolled back, requiring drain, reset, or tombstones instead."
claim_impact = "OS-level commit/abort and heterogeneous publication are prior ingredients; CSER's claim must exclude generic OS transactions."

[[row]]
id = "speculator.causal-dependencies"
primary_source = "Nightingale, Chen, and Flinn, Speculative Execution in a Distributed File System, SOSP 2005, https://doi.org/10.1145/1095810.1095829"
source_locator = "sections 3-5, including create/commit/fail speculation, dependency propagation, output withholding, and rollback"
mechanism = "Speculator attaches speculation dependencies to processes and kernel objects, propagates them through IPC and files, checkpoints state, and commits or rolls back when the speculation resolves."
authority_scope = "A speculation identifier and the processes and kernel objects that depend on it."
async_effect_tracking = "Present: dependency references propagate through fork, exit, signals, pipes, FIFOs, Unix sockets, and local or distributed files."
commit_or_linearization_gate = "Externally visible output is blocked or buffered until dependencies commit; failure rolls state back to a checkpoint."
crash_or_rebind_fencing = "Not established as replacement-service binding fencing."
resource_accounting = "Outstanding speculations and checkpoint age are capped, but the audited source does not define conserved typed credits."
device_quiescence = "External output is withheld, but device reset and DMA quiescence are not established."
overlap_with_cser = "Causal dependency propagation, commit/fail resolution, external-publication gating, and bounded retained state are close mechanism precedents."
difference_from_fixed_cser_boundary = "Speculator optimistically executes and rolls back speculative process/kernel state; fixed CSER closes authority and preserves honest post-commit effects until terminalization or device quiescence."
claim_impact = "Causal effect tracking and output commit gating are prior ingredients and cannot independently support a CSER contribution."

[[row]]
id = "rethink-the-sync.causal-dependencies"
primary_source = "Nightingale et al., Rethink the Sync, OSDI 2006, https://www.usenix.org/legacy/events/osdi06/tech/nightingale/nightingale.pdf"
source_locator = "sections 1-2.4, especially commit dependencies and output-triggered commits"
mechanism = "Xsyncfs propagates commit dependencies from uncommitted file transactions and buffers causally dependent external output until the required disk commits complete."
authority_scope = "File-system transactions and processes or kernel objects that inherit their commit dependencies."
async_effect_tracking = "Present: dependencies propagate through IPC and external-output paths while asynchronous disk work is pending."
commit_or_linearization_gate = "External output is released only after dependent file modifications commit; attempted output can trigger the commit."
crash_or_rebind_fencing = "Crash durability is a goal, but restartable-service binding epochs are not established."
resource_accounting = "Not established as conserved typed credits."
device_quiescence = "Disk durability is considered, but reset acknowledgement, DMA ownership, and IOMMU quiescence are outside the audited mechanism."
overlap_with_cser = "Causal propagation from asynchronous work to a publication gate closely precedes CSER's causal effect and commit-gate ingredients."
difference_from_fixed_cser_boundary = "External synchrony delays observation to preserve durability ordering; it does not revoke an authority scope or close multiple restartable service domains."
claim_impact = "Causal dependencies and publication gating are prior ingredients; only a narrower cross-service revoke/recovery composition remains decidable."

[[row]]
id = "chubby.fencing"
primary_source = "Burrows, The Chubby Lock Service for Loosely-Coupled Distributed Systems, OSDI 2006, https://www.usenix.org/legacy/events/osdi06/tech/full_papers/burrows/burrows.pdf"
source_locator = "section 2.4, Locks and sequencers"
mechanism = "A lock holder obtains a sequencer containing the lock name, mode, and generation; downstream servers validate it, while lock-delay mitigates stale delayed requests for unmodified servers."
authority_scope = "One distributed lock generation and operations protected by that lock."
async_effect_tracking = "Not established as a registry of derived asynchronous effects."
commit_or_linearization_gate = "The downstream resource server is expected to reject a request whose sequencer is no longer valid."
crash_or_rebind_fencing = "Present: lock generation sequencers fence a failed or replaced lock holder; lock-delay is an explicitly imperfect fallback."
resource_accounting = "Not established as conserved per-authority credits."
device_quiescence = "Not established."
overlap_with_cser = "Generation tokens and downstream stale-request rejection directly precede CSER's binding-epoch fencing."
difference_from_fixed_cser_boundary = "Chubby fences distributed lock holders at cooperating servers; it does not recursively close OS effects, budgets, continuations, or device ownership."
claim_impact = "Epoch-style fencing is established prior art, so CSER cannot claim fencing tokens alone."

[[row]]
id = "rifl.exactly-once-rpc"
primary_source = "Lee et al., Implementing Linearizability at Large Scale and Low Latency, SOSP 2015, https://doi.org/10.1145/2815400.2815416"
source_locator = "abstract and sections 1, 3, and 4"
mechanism = "RIFL assigns unique RPC identifiers, records completed results durably, returns the saved result to retries without re-execution, migrates metadata with objects, and uses leases for metadata collection."
authority_scope = "One client RPC identifier and its completion record, associated with the affected storage object."
async_effect_tracking = "Present at RPC granularity through outstanding request and durable completion metadata."
commit_or_linearization_gate = "Duplicate checking selects new execution, in-progress status, saved completion, or stale rejection so a completed operation is not re-executed."
crash_or_rebind_fencing = "Server crashes and reconfiguration are covered by durable, object-associated metadata rather than a user-space OS service binding epoch."
resource_accounting = "Leases bound metadata retention, but conserved heterogeneous OS resource credits are not established."
device_quiescence = "Not established."
overlap_with_cser = "Unique operation identity, durable completion tombstones, late retry rejection, and single-result semantics overlap CSER terminalization and tombstone ingredients."
difference_from_fixed_cser_boundary = "RIFL supplies RPC exactly-once semantics across distributed storage reconfiguration; it does not revoke a causal OS authority or drain device-visible effects."
claim_impact = "Duplicate suppression and retained completion records are prior ingredients; CSER must not claim them separately."

