[performance]
warmups = 7
samples = 65
empty_timer_samples = 257
statistics = ["min", "median", "p95", "max"]
retain_raw_samples = true
clock = "guest-visible-tsc-lfence"
environment = "single-vCPU single-thread TCG release-build hot-cache"
measurement_excludes = [
  "fixture-construction",
  "clone",
  "full-invariant-scan",
  "json",
  "serial-io",
]
negative_mutations = [
  "drop-case",
  "duplicate-case",
  "reorder-case",
  "unknown-scale-point",
  "operation-drift",
  "sample-count-drift",
  "statistic-recompute-mismatch",
  "fixture-inside-measurement",
]

[performance.operation_definitions]
begin = "measure RevokeBegin only"
complete = "pre-terminalize all k target effects, then measure RevokeComplete only"
closure = "measure RevokeBegin plus every RevokeNext and terminalization plus RevokeComplete"
projection = "measure scope_projection only over the configured retained history"

