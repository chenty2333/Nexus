mechanism = "CuriOS distributes client-specific state into protected client-associated memory so it survives service restart, while isolating services and granting state access during request processing."
authority_scope = "A microkernel OS service and per-client persistent service state."
async_effect_tracking = "Not established in the audited sections as a uniform causal registry of continuations, waits, timers, and device requests."
commit_or_linearization_gate = "Not established as a heterogeneous effect commit gate."
crash_or_rebind_fencing = "Service failure and transparent restart are central, but the audited design does not establish dual authority and binding epochs for stale reply fencing."
resource_accounting = "Not established as per-scope conserved credits."
device_quiescence = "The evaluated services include drivers, but the audited mechanism does not establish reset acknowledgement, DMA drain, or IOMMU invalidation as closure conditions."
overlap_with_cser = "It directly precedes restartable user-space OS services, persistent client state, and recovery across filesystem, network, timer, and scheduler services."
difference_from_fixed_cser_boundary = "CuriOS protects and persists service state; the fixed CSER boundary instead closes derived effects and credits with commit/revoke ordering, stale-binding rejection, and explicit device tombstones."
claim_impact = "Restartable multi-service OS structure is prior work; a CSER decision must rest on the narrower effect-lifetime composition."
