mechanism = "VINO executes each graft invocation inside a lightweight transaction, logs undo actions, aborts misbehaving or resource-hoarding grafts, and invokes the default function after abort."
authority_scope = "One installed kernel graft and an individual graft invocation transaction."
async_effect_tracking = "Event handlers are supported, but the audited transaction is invocation-scoped rather than a cross-service registry of descendants and outstanding asynchronous effects."
commit_or_linearization_gate = "The wrapper begins a transaction before the graft and commits when it returns; abort runs the undo stack and falls back to the default implementation."
crash_or_rebind_fencing = "Not established as a service binding epoch or replacement handshake."
resource_accounting = "Present: quantity limits can be transferred to or billed against a graft, and time-constrained resources can trigger transaction abort."
device_quiescence = "Not established; the transaction design is for undoable volatile kernel actions and does not establish post-publication DMA quiescence."
overlap_with_cser = "Commit/abort, bounded resource use, failure containment, and a kernel-owned default path are direct mechanism precedents."
difference_from_fixed_cser_boundary = "VINO relies on per-invocation undo transactions for in-kernel extensions; CSER's fixed boundary instead distinguishes pre-commit abort from honest post-commit drain, reset, or tombstone across restartable user-space services."
claim_impact = "Transaction gates, resource limits, and fallback are prior ingredients and must not be presented as standalone CSER contributions."
