audit_notes = ["Table 1 requires progress despite a faulty graft; sections 3.1-3.2 wrap a graft invocation in a transaction, delay lock release until commit or abort, invoke undo operations on abort, call the default function, and enforce time- and quantity-constrained resource limits. These locators do not establish restartable user-space binding epochs or post-publication device quiescence."]
