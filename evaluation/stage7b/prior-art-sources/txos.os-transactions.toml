audit_notes = ["Sections 1 and 3 define sys_xbegin, sys_xend, and sys_xabort; transactional accesses remain isolated and publish atomically at commit across files, memory management, signals, and process creation. These locators establish OS commit/abort as a precedent but not authority revocation, replacement-service epochs, typed credits, or device quiescence."]
