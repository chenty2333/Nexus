mechanism = "TxOS groups system calls over heterogeneous OS resources into ACID system transactions with abort and atomic publication."
authority_scope = "An application-defined system transaction spanning files, memory management, signals, and process creation."
async_effect_tracking = "Transaction state and touched OS resources are tracked, but the audited mechanism is not an authority-derived reverse index of heterogeneous asynchronous effects."
commit_or_linearization_gate = "Transactional accesses remain isolated until sys_xend commit, when updates are atomically published; sys_xabort discards an in-progress transaction."
crash_or_rebind_fencing = "Durability and crash consistency are addressed, but a restartable policy-service binding epoch is not established."
resource_accounting = "Fair contention is discussed, but conserved per-scope typed credits are not the audited abstraction."
device_quiescence = "Not established."
overlap_with_cser = "Explicit begin/commit/abort and delayed publication across OS resources precede CSER's commit-gate ingredient."
difference_from_fixed_cser_boundary = "TxOS offers transaction rollback and atomic durability; fixed CSER revokes authority and explicitly refuses to call already externalized effects rolled back, requiring drain, reset, or tombstones instead."
claim_impact = "OS-level commit/abort and heterogeneous publication are prior ingredients; CSER's claim must exclude generic OS transactions."
