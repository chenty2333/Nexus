audit_notes = ["The author-hosted 15-page OSDI 2004 PDF matches the title and four authors in the USENIX conference record; SHA-256 is recorded over the downloaded PDF bytes.", "Sections 3.2-4.3 define passive replicated-call monitoring and active tap redirection: the shadow records connections, configuration, pending commands, outstanding packets, timers, interrupt lines, and I/O regions, then proxies while a clean driver is reinitialized and reattached to existing kernel resources.", "Sections 4.3.1-4.3.3 disable the device and interrupt line, remove I/O mappings where supported to prevent DMA, restore configuration, and replay or cancel outstanding requests; the paper explicitly says a crash after device submission but before completion notification leaves the shadow unable to know whether the request was processed.", "Section 4.5 limits recovery to dynamically reloadable fail-stop drivers with explicit monitorable interfaces and assumes no irreversible side effect; it says a bad disk write or printed check cannot be corrected. The audited source does not define causal root identity, binding generations, typed conserved credits, reset or IOTLB acknowledgement, or an exposed indeterminate tombstone."]
