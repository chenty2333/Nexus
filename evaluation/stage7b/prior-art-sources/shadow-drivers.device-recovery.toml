mechanism = "A class-specific shadow driver passively monitors replicated kernel-driver calls and records recovery state; after a fail-stop driver failure, taps redirect calls to the shadow while it proxies service, restarts a clean driver, reconnects existing kernel resources, restores configuration, and resumes or cancels outstanding requests."
authority_scope = "One device-driver instance and its class-specific shadow, including connections, configuration, pending commands, outstanding packets, and kernel objects. The paper does not define one request-derived authority root spanning multiple restartable OS services."
async_effect_tracking = "Present for the device boundary: pending commands remain logged until handled, outstanding packets retain tracked references, and the shadow records timers, interrupt lines, and I/O regions. Tracking follows one driver interface and cannot observe ad-hoc shared-memory communication; it is not a registry-native causal descendant tree."
commit_or_linearization_gate = "The paper explicitly states that shadow drivers cannot guarantee exactly-once behavior: after device submission but before kernel completion notification, the shadow cannot know whether a request ran and must choose between replay with duplication risk and cancellation with loss risk. It defines no revoke-versus-device-commit gate or one-shot guest-result publication."
crash_or_rebind_fencing = "Active taps cut driver-kernel communication, a clean driver is reinitialized, existing registrations and callbacks are reattached, and taps return to passive mode after state transfer. No binding generation, stale callback or ticket validation, or identity-preserving cross-service adoption protocol is specified."
resource_accounting = "Nooks object tracking lets the shadow retain kernel-visible service objects, garbage-collect other driver resources, and reuse existing registrations during restart. The paper does not define a conserved typed-credit ledger shared by multiple services."
device_quiescence = "Recovery disables the device and interrupt line and, where the platform supports I/O memory mapping, removes mappings to prevent DMA before restart; resources are later re-enabled as the driver is reattached. The paper defines neither reset and IOTLB acknowledgement nor generation-checked ownership or a retained same-effect tombstone, and it assumes no irreversible side effect that recovery would need to undo."
overlap_with_cser = "Direct overlap includes request and configuration tracking, proxying across driver restart, outstanding-request replay or cancellation, IRQ and DMA-mapping fencing, retained resource identity, and explicit recognition that post-submission completion may be unknowable."
difference_from_fixed_cser_boundary = "Shadow Drivers conceals failure and applies class-specific replay or cancellation despite post-submit ambiguity. Fixed CSER instead composes one canonical production authority and shared ledger across personality, filesystem, block, and device domains, orders revocation against commit, and reports indeterminate post-commit closure while retaining ownership until reset and IOTLB acknowledgement."
claim_impact = "Shadow Drivers establishes device recovery, interface-level effect tracking, resource reattachment, IRQ and DMA fencing, and post-submit ambiguity as prior ingredients. A CSER contribution must therefore rest on canonical cross-service identity, generational fencing, shared conserved ownership, and an explicit honest closure and tombstone result rather than those ingredients separately."
