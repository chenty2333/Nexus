mechanism = "Device and virtqueue reset protocols stop queue execution and notification, restore reset state, require the driver to verify reset, and constrain when exposed buffers or queue resources may be released."
authority_scope = "A virtio device or individually resettable virtqueue and its exposed buffers."
async_effect_tracking = "Virtqueues track available and used descriptors, but the specification does not define an OS authority-derived causal effect registry."
commit_or_linearization_gate = "A live queue's exposed buffers must not be altered; reset verification is required before queue resources may be released."
crash_or_rebind_fencing = "Device status and reset fence old queue activity, but a restartable user-space service binding epoch is not specified."
resource_accounting = "The driver retains queue-associated resources until reset succeeds; general conserved service credits are outside the specification."
device_quiescence = "Present: after device-reset completion the device must not notify or interact with queues, and after queue reset it must not execute requests or notify the driver."
overlap_with_cser = "It supplies the protocol boundary for honest post-publication reset, quiescence, and deferred resource release."
difference_from_fixed_cser_boundary = "VirtIO specifies device/queue behavior only; it does not connect reset to a root authority, service epochs, cross-domain reverse indexes, or budget closure."
claim_impact = "Device reset and queue-resource retention are standardized prior mechanisms; CSER can only evaluate their integration into its fixed causal scope."
digest_algorithm = "sha256"
