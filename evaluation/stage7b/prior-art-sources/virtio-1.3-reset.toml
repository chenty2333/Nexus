audit_notes = ["Sections 2.1, 2.4, 2.6.1, and 3.3 require reset-state verification, prohibit device queue interaction after reset completion, prohibit requests/notifications on a reset queue, permit queue-resource release only after successful reset, and forbid altering exposed buffers while a queue is live. The specification does not tie those rules to a cross-service authority or budget graph."]
