mechanism = "A capability derivation tree supports recursive revocation of derived capabilities; reply authority is represented by a single-use reply capability or MCS reply object."
authority_scope = "Capability derivation from a selected capability, plus one caller-specific reply authority."
async_effect_tracking = "Partial: the kernel tracks blocked callers and reply authority, but the audited sections do not define a general causal registry for timers, I/O, and other derived effects."
commit_or_linearization_gate = "Invoking the reply authority sends the reply and consumes the single-use right; ordinary capability revoke removes CDT descendants."
crash_or_rebind_fencing = "Not established in the audited sections as a service binding epoch or replacement-service handshake."
resource_accounting = "Not established in the audited sections as conserved per-scope credits."
device_quiescence = "Not established in the audited sections."
overlap_with_cser = "One-shot reply authority and recursive withdrawal of derived authority are direct ingredients of the CSER boundary."
difference_from_fixed_cser_boundary = "The manual states that a non-MCS reply capability becomes unrelated to the original endpoint, so endpoint destruction does not itself close that reply; the audited mechanism does not compose all seven Nexus domains under one effect scope."
claim_impact = "Basic capability revocation and one-shot reply authority are prior ingredients; any supported CSER contribution must be limited to the fixed cross-domain composition and its additional gates."
