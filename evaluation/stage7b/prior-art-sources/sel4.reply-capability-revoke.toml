audit_notes = ["Sections 2.4.1 and 3.2 define CDT-derived capability revocation; section 4.2.4 defines single-use reply authority and says the non-MCS reply capability is unrelated to the original endpoint after call delivery. The comparison therefore treats revoke and one-shot reply as audited ingredients, while service epochs, typed credits, and device quiescence remain unestablished by these locators."]
