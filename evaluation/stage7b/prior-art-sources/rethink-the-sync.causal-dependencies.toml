mechanism = "Xsyncfs propagates commit dependencies from uncommitted file transactions and buffers causally dependent external output until the required disk commits complete."
authority_scope = "File-system transactions and processes or kernel objects that inherit their commit dependencies."
async_effect_tracking = "Present: dependencies propagate through IPC and external-output paths while asynchronous disk work is pending."
commit_or_linearization_gate = "External output is released only after dependent file modifications commit; attempted output can trigger the commit."
crash_or_rebind_fencing = "Crash durability is a goal, but restartable-service binding epochs are not established."
resource_accounting = "Not established as conserved typed credits."
device_quiescence = "Disk durability is considered, but reset acknowledgement, DMA ownership, and IOMMU quiescence are outside the audited mechanism."
overlap_with_cser = "Causal propagation from asynchronous work to a publication gate closely precedes CSER's causal effect and commit-gate ingredients."
difference_from_fixed_cser_boundary = "External synchrony delays observation to preserve durability ordering; it does not revoke an authority scope or close multiple restartable service domains."
claim_impact = "Causal dependencies and publication gating are prior ingredients; only a narrower cross-service revoke/recovery composition remains decidable."
