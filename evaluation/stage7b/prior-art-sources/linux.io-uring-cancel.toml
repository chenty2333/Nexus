audit_notes = ["DESCRIPTION, ERRORS, and NOTES define matching by user_data, descriptor, opcode, or broad flags; ENOENT for absent/completed requests; EALREADY when cancellation is too late; and completion-event ordering for successful or too-late cancellation. The API does not establish recursive authority closure, service rebind fencing, typed budgets, or general device reset/DMA quiescence."]
