async_effect_tracking = "Present at ring-request granularity through request identity and completion events."
commit_or_linearization_gate = "If execution has progressed too far, cancellation returns EALREADY and the caller must await the target's completion; successful cancellation posts the target completion before submission returns."
crash_or_rebind_fencing = "Not established as service rebind fencing."
resource_accounting = "Completion ordering constrains when a canceled request is finished, but typed conserved resource credits are not exposed."
device_quiescence = "Not established as a general device reset/DMA guarantee."
overlap_with_cser = "It directly precedes asynchronous cancel-versus-complete races, too-late cancellation, and explicit terminal completion observation."
difference_from_fixed_cser_boundary = "io_uring cancellation targets ring requests and matching keys; it does not recursively revoke a root authority across OS services or define device-owner tombstones."
claim_impact = "Asynchronous I/O cancellation and too-late status are prior interface semantics; CSER's claim must be the bounded composition around them."
