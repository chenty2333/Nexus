mechanism = "A kernel-resident CHERI capability sweeper revokes capabilities into quarantined heap regions before the allocator may reuse those regions."
authority_scope = "Capabilities into quarantined allocations within a CheriABI address space."
async_effect_tracking = "Present but specialized: the revoker handles capabilities hoarded in kernel subsystems, and the asynchronous-I/O handler cancels associated requests."
commit_or_linearization_gate = "Reuse is delayed until the revocation sweep completes; the audited source does not expose a general prepare/commit gate for heterogeneous effects."
crash_or_rebind_fencing = "Not established as restartable-service binding fencing."
resource_accounting = "Quarantine delays memory reuse, but the audited source does not define conserved typed credits across OS services."
device_quiescence = "Not established as device reset, DMA drain, or IOMMU invalidation."
overlap_with_cser = "It combines capability revocation, delayed reclamation, kernel-held authority discovery, and explicit treatment of asynchronous I/O."
difference_from_fixed_cser_boundary = "Its target is heap temporal safety using address-space sweeping, not proportional closure of a root authority across scheduler, pager, personality, filesystem, network, readiness, and VirtIO domains."
claim_impact = "Revocation that reaches authority retained by asynchronous kernel facilities is a prior ingredient; CSER cannot claim that idea in isolation."
digest_algorithm = "sha256"
digest_scope = "UTF-8 bytes of audit_notes joined by LF in array order, with no trailing LF"
audit_notes = ["Sections III and IV-A describe a kernel revoker, allocator quarantine, concurrent sweeps, kernel-hoarded user capabilities, and specialized cancellation of asynchronous-I/O requests. The audit therefore records asynchronous retained authority and delayed reuse, but not restartable-service fencing, typed resource conservation, or device reset/DMA closure."]
