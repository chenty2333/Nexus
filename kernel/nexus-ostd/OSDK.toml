project_type = "kernel"
supported_archs = ["x86_64"]

[boot]
method = "grub-rescue-iso"

[grub]
boot_protocol = "multiboot2"

[qemu]
args = """\
    -machine q35,kernel-irqchip=split \
    -accel tcg,thread=single \
    -cpu Icelake-Server,+x2apic \
    -m 1G \
    -smp 1 \
    -no-reboot \
    -display none \
    -monitor none \
    -chardev stdio,id=serial0,signal=off \
    -serial chardev:serial0 \
    -chardev file,id=entry-debugcon,path=/work/artifacts/task-entry-debugcon-scratch.log \
    -device isa-debugcon,iobase=0xe9,chardev=entry-debugcon \
    -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
    -drive if=pflash,format=raw,unit=0,readonly=on,file=/root/ovmf/release/OVMF.fd \
    -drive if=pflash,format=raw,unit=1,file=/tmp/nexus-home/OVMF_VARS.fd \
"""

[scheme."runtime-fs-same-boot"]
build.features = ["virtio-cser-facade"]
qemu.args = """\
    -nodefaults \
    -machine q35,kernel-irqchip=split,default-bus-bypass-iommu=off \
    -accel tcg,thread=single \
    -cpu Icelake-Server,+x2apic \
    -m 1G \
    -smp 1 \
    -no-reboot \
    -display none \
    -monitor none \
    -chardev stdio,id=serial0,signal=off \
    -serial chardev:serial0 \
    -chardev file,id=entry-debugcon,path=/work/artifacts/runtime-fs-same-boot/task-entry-debugcon.log \
    -device isa-debugcon,iobase=0xe9,chardev=entry-debugcon \
    -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
    -device intel-iommu,intremap=on,caching-mode=on,dma-drain=on \
    -blockdev driver=file,filename=/opt/nexus-fixtures/runtime-fs-block.raw,node-name=nexusfs-file,read-only=on,auto-read-only=off \
    -blockdev driver=raw,file=nexusfs-file,node-name=nexusfs,read-only=on \
    -device virtio-blk-pci,drive=nexusfs,bus=pcie.0,addr=05.0,bootindex=-1,disable-legacy=on,iommu_platform=on,packed=off,indirect_desc=off,event_idx=off,queue_reset=off,queue-size=16,num-queues=1,ioeventfd=off,request-merging=off,vectors=0,write-cache=off,config-wce=off,discard=off,write-zeroes=off \
    -trace enable=virtio_set_status \
    -trace enable=virtio_pci_notify_write \
    -trace enable=virtio_queue_notify \
    -trace enable=virtio_blk_handle_read \
    -trace enable=virtio_blk_handle_write \
    -trace enable=virtio_blk_rw_complete \
    -trace enable=virtio_blk_req_complete \
    -trace enable=blk_co_pwritev \
    -trace enable=vtd_dmar_translate \
    -trace enable=vtd_dmar_fault \
    -trace enable=vtd_inv_desc_iotlb_global \
    -trace enable=vtd_inv_desc_wait_irq \
    -drive if=pflash,format=raw,unit=0,readonly=on,file=/root/ovmf/release/OVMF.fd \
    -drive if=pflash,format=raw,unit=1,file=/tmp/nexus-home/OVMF_VARS.fd \
"""

