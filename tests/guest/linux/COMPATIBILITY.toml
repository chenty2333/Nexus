[[workload]]
id = "linux-round4-futex-smoke"
status = "retained"
tier = "core"
class = "static-smoke"
source_ids = ["linux-round4-futex-smoke"]
legacy_scenarios = ["specs/conformance/scenarios/starnix_round4_futex_bootstrap.toml"]
required_behaviors = ["FUTEX_WAIT_PRIVATE", "FUTEX_WAKE_PRIVATE", "FUTEX_REQUEUE_PRIVATE", "clone-threaded waiters"]
success_markers = ["round4 futex ok"]
cser_effects = ["scheduler.proposal", "wait.registration", "timer.deadline", "service.syscall-continuation"]
injection_profile = [
  "crash scheduler policy while futex waiter and waker tasks are runnable and require kernel fallback",
  "crash Linux personality after the two-key requeue commits but before its frozen receipt is published",
  "recover the exact three-effect cohort through snapshot, ready, rebind, and explicit adoption",
  "replay the old-binding requeue handle after rebind and require a failure-atomic rejection",
  "exercise both commit-before-close and close-before-commit companions; the retained guest passes no Linux futex timeout",
]
expected_properties = ["PostRevokeCommitExclusion", "QuiescentClosure", "SingleTerminalization", "CrashRebindFencing", "FallbackProgress", "BudgetConservation"]
adaptation_required = ["The exact retained source expects FUTEX_REQUEUE_PRIVATE to return only the number of woken waiters. Linux futex_requeue counts both woken and requeued waiters, so the unmodified source loops after the first two-waiter requeue. Stage 6B must use an explicit reproducible adaptation or a new Nexus-owned conformance source; the personality must not emulate the legacy return value."]
notes = "Stage 6B.2 executes the explicitly adapted retained Round 4 program in the pinned one-CPU OSTD/QEMU personality: mmap creates eight pages, three clone tasks share one VmSpace, waits are FIFO, FUTEX_REQUEUE_PRIVATE atomically wakes one and moves one, and the frozen Linux affected count is two. A real personality crash advances the binding epoch; the replacement explicitly adopts the committed controller and both remaining waits, old-binding work is rejected without mutation, and commit-before-close / close-before-commit companions reach quiescence through the common personality-local registry. This completes the bounded futex core workload, not general futex support: Linux timeout, signals, shared/PI/robust futexes, unmap invalidation, lost-wakeup/SMP proof, and the cross-service registry remain pending."

