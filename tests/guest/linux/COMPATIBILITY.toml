[[workload]]
id = "linux-dynamic-pie-smoke"
status = "retained"
tier = "core"
class = "dynamic-loader-smoke"
source_ids = ["linux-dynamic-pie-smoke", "linux-dynamic-pie-main", "linux-dynamic-runtime-interp"]
legacy_scenarios = ["specs/conformance/scenarios/starnix_dynamic_pie_bootstrap.toml"]
required_behaviors = ["ET_DYN main image", "PIE load bias", "PT_INTERP", "TLS and auxv through the runtime interpreter"]
success_markers = ["dynamic pie ok"]
cser_effects = ["exec.transaction", "exec.mapping", "service.syscall-continuation", "budget.credit"]
injection_profile = [
  "crash Linux personality v1 after all eleven staging effects are prepared but before ExecCommit",
  "after snapshot, ready, and rebind, require eleven explicit adoptions before image commit",
  "replay an old-binding handle both before and after commit and require an unchanged full registry/image projection",
  "publish the new VmSpace only after one atomic ExecCommit, then acknowledge transaction, write, and exit publications",
]
expected_properties = ["PostRevokeCommitExclusion", "QuiescentClosure", "SingleTerminalization", "CrashRebindFencing", "BudgetConservation"]
notes = "Stage 6B.2 runs one fixed ET_EXEC launcher that performs execve into an ET_DYN main plus ET_DYN interpreter. Eight PT_LOAD effects, one TLS/TCB effect, one stack effect, and the exec controller survive a pre-commit personality crash, then require snapshot/ready/rebind and eleven explicit adoptions before one atomic ExecCommit publishes a fresh VmSpace. The guest observes richer auxv, interpreter and main TLS, explicit FS-base load/save, exact stdout, and one exit; stale calls are failure-atomic and all twelve credits return. This completes the bounded dynamic PIE core workload only for one CPU and one TLS-bearing task; general relocations, shared libraries, libc/ld.so, multi-task TLS lifecycle, filesystem-backed loading, and SMP remain pending."

