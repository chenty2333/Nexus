[[workload]]
id = "linux-runtime-fs-smoke"
status = "retained"
tier = "core"
class = "static-runtime-smoke"
source_ids = ["linux-runtime-fs-smoke"]
legacy_scenarios = ["specs/conformance/scenarios/starnix_runtime_fs_bootstrap.toml"]
required_behaviors = ["pread64/pwrite64", "statx", "fstatat AT_EMPTY_PATH", "relative /proc readlinkat"]
success_markers = ["runtime fs ok"]
cser_effects = ["pager.fault-continuation", "io.block-request", "dma.mapping", "budget.credit", "service.syscall-continuation"]
injection_profile = [
  "crash pager around guest-buffer or file-page mapping publication",
  "crash filesystem or block service before request commit and after mediated queue publication",
  "force drain/reset or IOTLB invalidation timeout and require a retained tombstone",
  "replay a stale block completion after service rebind",
]
expected_properties = ["PostRevokeCommitExclusion", "QuiescentClosure", "SingleTerminalization", "CrashRebindFencing", "BudgetConservation"]
notes = "Stage 6 executes this unchanged retained input as a digest-pinned static ELF in one-CPU OSTD/QEMU. The exact 14-syscall receipt covers executable and temporary inodes, sparse-offset pwrite/pread, statx, newfstatat AT_EMPTY_PATH, relative /proc/self/exe readlinkat, close, stdout, and exit through the common effect registry. A separate four-domain lifecycle companion observes pager/filesystem/personality binding recovery, both pwrite/revoke orders, reset and IOTLB owner-retaining tombstones, device-generation fencing, and full stale-call projection equality. The primary boot uses bounded in-memory filesystem/block state and no real DMA; a strict source/ELF/sector/full-image digest oracle joins the existing real Stage 5B boot only as component_consistency with same_boot=false and identity_preserving=false. This is not a general VFS, persistence, durable write, or SMP claim."

