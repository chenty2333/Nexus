schema_version = 1
catalog = "nexus.linux-guest.compatibility"
normative = false
target_stage = "linux-personality-pressure-test"
description = "Behavior coverage retained from old Starnix scenarios, expressed without the old implementation boundary."

[policy]
identity = "Linux compatibility is a pressure test for scheduler, pager, wait/timer, IPC, and mediated I/O CSER semantics."
implementation = "Rewrite the personality; do not copy user/nexus-init/src/starnix."
uapi = "Use maintained Linux UAPI crates and pinned guest libc artifacts; raw constants in retained sources are test-local inputs only."
success = "The runner must check guest exit status and declared markers without depending on old component-manager summary fields."
legacy_provenance = "legacy_scenarios entries identify Git commit 8d5d07e35b0051bd4ef001224714decc0615ff49 and need not remain present after the old tree is deleted."

[tier_policy]
core = "The bounded Stage 6 acceptance set. Only these workloads are commitments, and each must run with its declared CSER fault-injection profile."
stretch = "Useful compatibility breadth attempted only after the core gate; absence does not fail the CSER prototype."
archive_input = "A source-level regression seed retained for future experiments, with no implementation commitment."

[[workload]]
id = "linux-hello"
status = "retained"
tier = "core"
class = "static-smoke"
source_ids = ["linux-hello"]
legacy_scenarios = ["specs/conformance/scenarios/starnix_round1_bootstrap.toml"]
required_behaviors = ["ELF ET_EXEC load", "write", "exit_group"]
success_markers = ["hello from linux-hello"]
cser_effects = ["scheduler.proposal", "pager.fault-continuation", "service.syscall-continuation"]
injection_profile = [
  "crash scheduler policy while the hello task is runnable and require kernel fallback",
  "crash pager after code-page fault registration and before mapping publication",
  "crash Linux personality after write BackendCommit and before guest reply",
  "send an old-binding full-identity write reply through the normal user portal after crash and rebind",
  "race personality authority revocation against an uncommitted write and a backend-committed write, requiring respectively one abort and one kernel closure drain before RevokeComplete",
]
expected_properties = ["PostRevokeCommitExclusion", "QuiescentClosure", "SingleTerminalization", "CrashRebindFencing", "FallbackProgress"]
notes = "Stage 6A executes linux-hello plus bounded companion portal/revocation scenarios through the same personality state machine; it does not complete the other five core workloads or a unified cross-service revoke registry."

