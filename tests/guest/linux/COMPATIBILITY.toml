[[workload]]
id = "linux-round5-epoll-smoke"
status = "retained"
tier = "core"
class = "static-smoke"
source_ids = ["linux-round5-epoll-smoke"]
legacy_scenarios = ["specs/conformance/scenarios/starnix_round5_epoll_bootstrap.toml"]
required_behaviors = ["epoll_create1", "epoll_ctl", "epoll_wait", "level-triggered", "edge-triggered", "oneshot", "pipe/socketpair readiness", "regular-file EPERM rejection"]
success_markers = ["round5 epoll ok"]
cser_effects = ["wait.registration", "timer.deadline", "ipc.operation", "service.syscall-continuation"]
injection_profile = [
  "crash Linux personality after epoll registration and before readiness delivery",
  "race source wake with revoke cancellation and timeout",
  "replay queued readiness from an old binding after rebind",
]
expected_properties = ["PostRevokeCommitExclusion", "QuiescentClosure", "SingleTerminalization", "CrashRebindFencing", "BudgetConservation"]
adaptation_required = ["The exact retained source expects epoll_ctl(EPOLL_CTL_ADD) to accept a regular file and report EPOLLIN. Linux rejects regular-file epoll targets with EPERM. Stage 6 must apply the visible temporary-build adaptation, retain pipe/socketpair coverage, and test immediately-ready generic sources in a separate Nexus-owned readiness companion rather than emulate the legacy result."]
notes = "Stage 6B.2 executes the adapted retained workload in pinned one-CPU QEMU: pipe edge-triggered and one-shot delivery, socketpair level-triggered delivery, timeout-zero empty results, and regular-file EPERM all match the strict receipt oracle. A separate readiness lifecycle companion covers atomic sample+arm, generational source/set/subscription fencing, snapshot and post-Ready invalidation by source/queue changes, rejection of an unadopted old-binding subscription, crash/rebind plus six explicit adoptions, ready/timeout/revoke winner races, immutable delivery, one-shot publication, and final credit/index closure through the common personality-local registry. This is a bounded readiness core, not full epoll/fd semantics, asynchronous SMP proof, runtime filesystem, or runtime network readiness."

